name: gaming4free renew (WARP)

on:
  workflow_dispatch:
  schedule:
    - cron: "5 * * * *"  # 每小时的第 5 分钟执行

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # =========================
      # 🟡 0️⃣ 当前仓库
      # =========================
      - name: Checkout current repo
        uses: actions/checkout@v4

      # =========================
      # 🟡 ⭐ 私有仓库
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: private-repo

      # =========================
      # 🟡 Node环境
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 🟡 1️⃣ WARP
      # =========================
      - name: 创建WARP网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      # =========================
      # 🟡 2️⃣ 系统依赖（音频）
      # =========================
      - name: Install deps
        timeout-minutes: 8
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full ffmpeg python3 python3-pip
          
          # 修复点：Ubuntu 环境下直接 pip 安装容易报 "externally-managed-environment" 错误，加上 --break-system-packages 强制执行
          python3 -m pip install --quiet SpeechRecognition pydub --break-system-packages

      # =========================
      # 🟡 3️⃣ 安装 Playwright
      # =========================
      - name: Install playwright
        timeout-minutes: 10
        run: |
          cd private-repo/scripts/gm4
          npm install
          # 修复点：加上 --with-deps，自动补全 Chromium 运行所需的 Ubuntu 底层系统库，防止启动时黑屏或报错
          npx playwright install --with-deps chromium

      # =========================
      # 🟡 4️⃣ 调试 IP
      # =========================
      - name: Check IP
        run: |
          echo "🌍 当前 IP:"
          curl -s https://api.ipify.org
          echo ""
          curl -s https://ipinfo.io

      # =========================
      # 🟡 5️⃣ 运行脚本
      # =========================
      - name: Run script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p private-repo/scripts/gm4/screenshots
          xvfb-run -a node private-repo/scripts/gm4/renew.js
