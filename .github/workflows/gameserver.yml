name: gameserver (Git Save)

on:
  workflow_dispatch: # 允许网页手动点击触发
    inputs:
      run_renew:
        description: Run renew.py instead of main.py
        required: false
        default: 'false'
  repository_dispatch: # ✅ 允许 Webhook 触发
    types: [start-server] # 你的事件名称
  schedule:
    - cron: '0 0 * * *' # auto-renew schedule

# 赋予写权限，以便提交 cookie.txt
permissions:
  contents: write

jobs:
  run-selenium:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}
          path: workflow-repo

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: private-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        working-directory: private-repo/scripts/gameserver
        run: |
          pip install -r requirements.txt

      - name: Setup Proxy
        env:
          gameserver_PROXY_URL: ${{ secrets.gameserver_PROXY_URL }}
        run: |
          if [ -z "$gameserver_PROXY_URL" ]; then
            echo "[INFO] 未配置代理，使用直连模式"
            echo "PROXY_SERVER=" >> $GITHUB_ENV
            exit 0
          fi

          if [[ "$gameserver_PROXY_URL" == http://* || "$gameserver_PROXY_URL" == https://* ]]; then
            echo "[INFO] 使用 HTTP/HTTPS 代理"
            echo "PROXY_SERVER=$gameserver_PROXY_URL" >> $GITHUB_ENV
            exit 0
          fi

          if [[ "$gameserver_PROXY_URL" != vless://* && "$gameserver_PROXY_URL" != vmess://* ]]; then
            echo "[ERROR] 不支持的代理格式。支持 http://、https://、vless://、vmess://"
            exit 1
          fi

          echo "[INFO] 检测到 VLESS/VMess 节点，安装并启动 Xray 本地代理"
          wget -q https://github.com/oyz6/action/releases/download/proxy/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray
          chmod +x xray/xray

          python3 << 'PYEOF'
          import base64
          import json
          import os
          import sys
          from urllib.parse import parse_qs, unquote


          def mask(value):
              return f"{value[:2]}***{value[-2:]}" if len(value) > 4 else "****"


          node = os.environ.get("gameserver_PROXY_URL", "").strip()
          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 1080, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 1081, "listen": "127.0.0.1", "protocol": "http"},
              ],
              "outbounds": [],
          }

          if node.startswith("vless://"):
              content = node[8:].split("#", 1)[0]
              uuid, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])

              print(f"[INFO] VLESS -> {mask(address)}:{port} (security: {security}, network: {network})")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": int(port),
                          "users": [{"id": uuid, "encryption": "none"}],
                      }]
                  },
                  "streamSettings": {"network": network, "security": security},
              }

              if flow:
                  outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow

              if security == "reality":
                  outbound["streamSettings"]["realitySettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "publicKey": pbk,
                  }
              elif security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False,
                  }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host},
                  }
              elif network == "grpc":
                  outbound["streamSettings"]["grpcSettings"] = {
                      "serviceName": params.get("serviceName", [""])[0],
                  }

              config["outbounds"].append(outbound)

          elif node.startswith("vmess://"):
              content = node[8:].split("#", 1)[0]
              padding = 4 - len(content) % 4
              if padding != 4:
                  content += "=" * padding

              try:
                  vmess = json.loads(base64.b64decode(content).decode("utf-8"))
              except Exception as exc:
                  print(f"[ERROR] VMess 解析失败: {exc}")
                  sys.exit(1)

              address = vmess.get("add", "")
              port = int(vmess.get("port", 443))
              uuid = vmess.get("id", "")
              aid = int(vmess.get("aid", 0))
              network = vmess.get("net", "tcp")
              tls = vmess.get("tls", "")
              sni = vmess.get("sni", "") or vmess.get("host", address)
              host = vmess.get("host", address)
              path = vmess.get("path", "/")
              fp = vmess.get("fp", "chrome")

              print(f"[INFO] VMess -> {mask(address)}:{port} (network: {network}, tls: {tls})")

              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": port,
                          "users": [{"id": uuid, "alterId": aid, "security": "auto"}],
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls" if tls == "tls" else "none",
                  },
              }

              if tls == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False,
                  }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host},
                  }

              config["outbounds"].append(outbound)

          else:
              print("[ERROR] 不支持的节点协议")
              sys.exit(1)

          with open("xray_config.json", "w", encoding="utf-8") as file:
              json.dump(config, file, indent=2)

          print("[INFO] Xray 配置已生成")
          PYEOF

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          echo "[INFO] 测试本地 HTTP 代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x http://127.0.0.1:1081 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] 代理连接成功"
              echo "PROXY_SERVER=http://127.0.0.1:1081" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 代理测试失败，重试 $i/5"
            sleep 3
          done

          echo "[ERROR] 代理连接失败"
          cat xray.log
          exit 1

      - name: Run Renewal Script
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_renew == 'true')
        working-directory: private-repo/scripts/gameserver
        env:
          gameserver_ACCOUNTS: ${{ secrets.gameserver_ACCOUNTS }}
          gameserver_PROXY_URL: ${{ env.PROXY_SERVER }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          WORKFLOW_FILE: ${{ github.workspace }}/workflow-repo/.github/workflows/gameserver.yml
        run: |
          python renew.py

      - name: Run Selenium Script
        if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && github.event.inputs.run_renew == 'true')
        working-directory: private-repo/scripts/gameserver
        env:
          gameserver_ACCOUNTS: ${{ secrets.gameserver_ACCOUNTS }}
          # 👇 这里的变量名和 Secret 名都改成了带前缀的
          gameserver_PROXY_URL: ${{ env.PROXY_SERVER }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python main.py

      - name: Commit and Push Cookie
        working-directory: private-repo
        run: |
          git config user.name "Auto Bot"
          git config user.email "bot@github.com"
          
          git add scripts/gameserver/cookie.txt
          
          if git diff --staged --quiet; then
            echo "✅ Cookie 没有变化，跳过提交。"
          else
            echo "🍪 检测到 Cookie 更新，正在推送到仓库..."
            git commit -m "Update cookie.txt [skip ci]"
            git push
          fi

      - name: Commit and Push Workflow Schedule
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_renew == 'true')
        working-directory: workflow-repo
        run: |
          git config user.name "Auto Bot"
          git config user.email "bot@github.com"
          git add .github/workflows/gameserver.yml
          if git diff --staged --quiet; then
            echo "✅ Workflow 时间没有变化，跳过提交。"
          else
            echo "🕒 检测到 workflow cron 更新，正在推送..."
            git commit -m "Update gameserver renew schedule [skip ci]"
            git push
          fi
