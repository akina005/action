name: VPS8 Auto Checkin

on:
  workflow_dispatch:

  schedule:
    - cron: "19 0 * * *"

  push:
    paths:
      - "checkin.py"
      - "vps8.yml"

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Xray
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          mkdir -p xray-bin
          unzip -oq Xray-linux-64.zip -d xray-bin
          chmod +x xray-bin/xray
          sudo mv xray-bin/xray /usr/local/bin/xray

      - name: Build Xray config
        env:
          vps8_PROXY: ${{ secrets.vps8_PROXY }}
        run: |
          if [ -z "${vps8_PROXY}" ]; then
            echo "[proxy] vps8_PROXY 未配置，使用直连"
            exit 0
          fi
          python - <<'PY'
          import base64
          import json
          import os
          from urllib.parse import parse_qs, unquote, urlparse

          proxy_url = os.environ["vps8_PROXY"].strip()
          parsed = urlparse(proxy_url)
          scheme = parsed.scheme

          if scheme not in {"vless", "vmess"}:
              raise SystemExit(f"Unsupported proxy scheme: {scheme}")

          def build_stream_settings(query, host):
              transport_type = query.get("type", "tcp")
              if transport_type == "h2":
                  transport_type = "http"

              stream_settings = {
                  "network": transport_type,
                  "security": query.get("security", "none"),
              }

              if stream_settings["security"] == "reality":
                  reality = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                      "publicKey": query.get("pbk", ""),
                  }
                  if query.get("sid"):
                      reality["shortId"] = query["sid"]
                  if query.get("spx"):
                      reality["spiderX"] = query["spx"]
                  stream_settings["realitySettings"] = reality
              elif stream_settings["security"] == "tls":
                  stream_settings["tlsSettings"] = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                  }

              if transport_type == "tcp":
                  stream_settings["tcpSettings"] = {
                      "header": {"type": query.get("headerType", "none")}
                  }
              elif transport_type == "ws":
                  headers = {}
                  if query.get("host"):
                      headers["Host"] = query["host"]
                  stream_settings["wsSettings"] = {
                      "path": query.get("path", "/"),
                      "headers": headers,
                  }
              elif transport_type == "http":
                  stream_settings["httpSettings"] = {
                      "host": [h for h in query.get("host", "").split(",") if h],
                      "path": query.get("path", "/"),
                  }
              elif transport_type == "grpc":
                  stream_settings["grpcSettings"] = {
                      "serviceName": query.get("serviceName", ""),
                      "authority": query.get("authority", ""),
                  }

              return stream_settings

          if scheme == "vless":
              qs = {k: v[-1] for k, v in parse_qs(parsed.query).items()}
              host = parsed.hostname
              port = parsed.port
              user_id = unquote(parsed.username or "")

              if not host or not port or not user_id:
                  raise SystemExit("Invalid VLESS URL: missing host, port, or uuid")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "encryption": qs.get("encryption", "none"),
                              "flow": qs.get("flow", ""),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(qs, host),
              }
          else:
              payload = parsed.netloc + parsed.path
              padded = payload + "=" * (-len(payload) % 4)
              vmess = json.loads(base64.urlsafe_b64decode(padded).decode("utf-8"))
              host = vmess.get("add")
              port = int(vmess.get("port", 0))
              user_id = vmess.get("id", "")
              if not host or not port or not user_id:
                  raise SystemExit("Invalid VMess URL: missing host, port, or uuid")

              query = {
                  "type": vmess.get("net", "tcp"),
                  "security": vmess.get("tls", "none"),
                  "path": vmess.get("path", "/") or "/",
                  "host": vmess.get("host", ""),
                  "sni": vmess.get("sni", "") or host,
                  "fp": vmess.get("fp", "chrome"),
                  "serviceName": vmess.get("path", ""),
                  "authority": vmess.get("host", ""),
                  "headerType": vmess.get("type", "none") or "none",
              }

              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "alterId": int(vmess.get("aid", 0) or 0),
                              "security": vmess.get("scy", "auto"),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(query, host),
              }

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{
                  "listen": "127.0.0.1",
                  "port": 8080,
                  "protocol": "http",
              }],
              "outbounds": [outbound],
          }

          with open("xray-config.json", "w", encoding="ascii") as f:
              json.dump(config, f, indent=2)
          PY

      - name: Start Xray proxy
        env:
          vps8_PROXY: ${{ secrets.vps8_PROXY }}
        run: |
          if [ -z "${vps8_PROXY}" ] || [ ! -f xray-config.json ]; then
            echo "[proxy] 未生成 Xray 配置，使用直连"
            echo "VPS8_RUNTIME_PROXY=" >> "$GITHUB_ENV"
            exit 0
          fi
          nohup xray run -c xray-config.json > xray.log 2>&1 &
          sleep 2
          xray version
          sed -n '1,20p' xray.log || true
          if curl -fsS --max-time 15 --proxy "http://127.0.0.1:8080" https://api.ipify.org >/tmp/vps8_proxy_ip; then
            echo "[proxy] 代理可用，出口 IP: $(cat /tmp/vps8_proxy_ip)"
            echo "VPS8_RUNTIME_PROXY=http://127.0.0.1:8080" >> "$GITHUB_ENV"
          else
            echo "[proxy] 代理不可用，回退直连"
            echo "VPS8_RUNTIME_PROXY=" >> "$GITHUB_ENV"
          fi

      - name: Setup environment
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          missing=""
          for pkg in xvfb python3-tk python3-dev google-chrome-stable fonts-noto-cjk fonts-wqy-zenhei fonts-wqy-microhei; do
            dpkg -s "$pkg" >/dev/null 2>&1 || missing="$missing $pkg"
          done
          if [ -n "$missing" ]; then
            echo "[setup] apt install:$missing"
            sudo -E apt-get update -qq
            sudo -E apt-get install -y -qq --no-install-recommends -o Dpkg::Use-Pty=0 $missing
          else
            echo "[setup] apt deps already installed"
          fi
          echo "[setup] pip install python deps"
          python3 -m pip install -q seleniumbase pyvirtualdisplay requests

      - name: Fetch vps8 script
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -o checkin.py \
            "https://raw.githubusercontent.com/akina005/scripts/main/scripts/vps8/checkin.py"

      - name: Fetch service expiry cache
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -o vps8_service_expiry.txt \
            "https://raw.githubusercontent.com/akina005/scripts/main/scripts/vps8/vps8_service_expiry.txt" \
            || true

      - name: Check IP
        run: |
          if [ -n "${VPS8_RUNTIME_PROXY}" ]; then
            curl -s --proxy "$VPS8_RUNTIME_PROXY" https://api.ipify.org && echo
            curl -s --proxy "$VPS8_RUNTIME_PROXY" https://ipinfo.io
          else
            curl -s https://api.ipify.org && echo
            curl -s https://ipinfo.io
          fi

      - name: Run python checkin flow
        env:
          vps8_ACCOUNTS: ${{ secrets.vps8_ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          vps8_PROXY: ${{ env.VPS8_RUNTIME_PROXY }}
          vps8_FORCE_RENEW: ${{ secrets.vps8_FORCE_RENEW }}
        run: |
          python3 checkin.py

      - name: Save service expiry cache
        if: always()
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ ! -s vps8_service_expiry.txt ]; then
            echo "[cache] 服务到期缓存不存在或为空，跳过保存"
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${REPO_TOKEN}@github.com/akina005/scripts.git" scripts-cache
          mkdir -p scripts-cache/scripts/vps8
          cp vps8_service_expiry.txt scripts-cache/scripts/vps8/vps8_service_expiry.txt
          cd scripts-cache
          if git diff --quiet -- scripts/vps8/vps8_service_expiry.txt; then
            echo "[cache] 服务到期缓存无变化"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/vps8/vps8_service_expiry.txt
          git commit -m "Update VPS8 service expiry cache"
          git push

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: screenshots/*
          retention-days: 1

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 4
