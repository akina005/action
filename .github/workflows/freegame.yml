name: FGH-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2,6,10,14,18,22 * * *'

jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb x11-utils xdotool scrot unzip curl

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 📥 从私库拉取续期脚本
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          test -n "$REPO_TOKEN"
          curl -L \
            -H "Authorization: Bearer $REPO_TOKEN" \
            -H "Accept: application/vnd.github.raw+json" \
            https://api.github.com/repos/akina005/scripts/contents/scripts/freegame/renew.py?ref=main \
            -o renew.py

      - name: 🚀 部署并启动 Xray 代理
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          # 1. 下载并解压 Xray-core
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip xray.zip xray -d ./xray-bin
          chmod +x ./xray-bin/xray
          
          # 2. 将 GitHub Secret 中的 JSON 写入配置文件
          echo "$XRAY_CONFIG" > ./xray-bin/config.json
          
          # 3. 后台静默启动 Xray
          nohup ./xray-bin/xray run -c ./xray-bin/config.json > xray.log 2>&1 &
          
          # 4. 等待 3 秒确保代理启动，并测试连通性获取出口 IP
          sleep 3
          echo "测试代理出口 IP:"
          curl -x socks5h://127.0.0.1:10808 https://api.ipify.org
          echo ""

      - name: 🚀 运行自动化续期脚本
        env:
          PYTHONIOENCODING: utf-8
          FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
          FGH_COOKIES: ${{ secrets.FGH_COOKIES }}  
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py
          
      - name: 📸 上传运行截图 (仅保留最新)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
