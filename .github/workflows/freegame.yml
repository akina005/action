name: Freegame-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # 每6小时自动运行一次

jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest
    # 定义全局环境变量，方便脚本和步骤调用
    env:
      FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
      GOST_PROXY: ${{ secrets.GOST_PROXY }}
      TG_BOT: ${{ secrets.TG_BOT }}

    steps:
      - name: 📥 检出仓库 (使用 REPO_TOKEN 拉取)
        uses: actions/checkout@v4
        with:
          # 使用你指定的 REPO_TOKEN 变量名
          token: ${{ secrets.REPO_TOKEN }}
          persist-credentials: false

      - name: 🐍 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 GOST 代理转发
        if: env.GOST_PROXY != ''
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          IP=$(curl -s -x http://127.0.0.1:8080 https://api.ipify.org)
          IP_MASKED=$(echo "$IP" | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1xx/')
          echo "✅ GOST 已启动，出口IP确认：$IP_MASKED"

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb x11-utils xdotool scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase beautifulsoup4 requests
          seleniumbase install chromedriver

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
        run: |
          # 核心修改：指定图片中的确切路径
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python scripts/freegame/renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          # 包含根目录和脚本目录下的所有 png 文件
          path: |
            *.png
            scripts/freegame/*.png
          retention-days: 3
