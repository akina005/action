name: Freegame-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'

jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest
    env:
      FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
      TG_BOT: ${{ secrets.TG_BOT }}
      FGH_PROXY_NODE: ${{ secrets.FGH_PROXY_NODE }}

    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - name: 🐍 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 🛡️ 配置并启动 VLESS 代理 (Xray)
        run: |
          if [ -z "$FGH_PROXY_NODE" ]; then exit 0; fi
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O xray.zip
          unzip -q xray.zip xray && chmod +x xray
          python -c '
          import os, urllib.parse, json
          link = os.environ.get("FGH_PROXY_NODE", "").strip()
          parsed = urllib.parse.urlparse(link)
          params = dict(urllib.parse.parse_qsl(parsed.query))
          outbound = {"protocol": "vless", "settings": {"vnext": [{"address": parsed.hostname, "port": int(parsed.port or 443), "users": [{"id": parsed.username, "encryption": params.get("encryption", "none"), "flow": params.get("flow", "")}]}]}, "streamSettings": {"network": params.get("type", "tcp"), "security": params.get("security", "none")}}
          if params.get("security") == "reality": outbound["streamSettings"]["realitySettings"] = {"serverName": params.get("sni", parsed.hostname), "publicKey": params.get("pbk", ""), "fingerprint": params.get("fp", "chrome"), "shortId": params.get("sid", ""), "spiderX": params.get("spx", "")}
          config = {"inbounds": [{"port": 8080, "listen": "127.0.0.1", "protocol": "http"}], "outbounds": [outbound]}
          with open("config.json", "w") as f: json.dump(config, f)
          '
          ./xray -c config.json > /dev/null 2>&1 &
          sleep 5

      - name: 🛠️ 安装依赖
        run: |
          sudo apt-get update && sudo apt-get install -y google-chrome-stable xvfb
          pip install seleniumbase beautifulsoup4 requests

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          GOST_PROXY: "TRUE"
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python scripts/freegame/renew.py

      - name: 📸 上传截图 (用于调试)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          # 修正了路径，确保能抓到脚本生成的图片
          path: "*.png" 
          retention-days: 2

      - name: 🧹 清理旧的运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 5
