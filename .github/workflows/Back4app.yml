name: B4A Auto Redeploy

on:
  schedule:
    - cron: '55 23 * * *'
    - cron: '55 0-14 * * *'  # 每60分钟
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout private scripts repo
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: private-scripts
          sparse-checkout: |
            scripts/Back4App/b4a_redeploy.py
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install seleniumbase requests pynacl

      - name: Install gost
        run: |
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.12.0/gost_2.12.0_linux_amd64.tar.gz
          tar -xzf gost_2.12.0_linux_amd64.tar.gz
          chmod +x gost
          sudo mv gost /usr/local/bin/gost

      - name: Start gost proxy
        env:
          PROXY_URL: ${{ secrets.b4a_PROXY_URL }}
        run: |
          nohup gost -D -L=http://:8080 -F="${PROXY_URL}" > gost.log 2>&1 &
          sleep 2
          gost -V
          sed -n '1,120p' gost.log || true
          echo "gost started"

      - name: Test proxy connectivity
        run: |
          curl -I --max-time 20 --proxy http://127.0.0.1:8080 https://www.back4app.com

      - name: Run redeploy script
        env:
          B4A_APP_ID: ${{ secrets.b4a_app_id }}
          CONNECT_SID: ${{ secrets.CONNECT_SID }}
          GH_TOKEN: ${{ secrets.REPO_TOKEN }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python private-scripts/scripts/Back4App/b4a_redeploy.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics
          path: |
            *.png
            gost.log
