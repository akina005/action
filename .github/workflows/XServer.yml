name: XServer 游戏机续期

on:
  schedule:
    - cron: '32 6 28 3 *' # 下一个: 2026-03-28 06:32 UTC
  workflow_dispatch:

jobs:
  extend-server:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        working-directory: scripts/XServer
        run: |
          npm init -y
          npm install playwright

      - name: 安装浏览器
        working-directory: scripts/XServer
        run: npx playwright install --with-deps chrome

      - name: 安装并启动代理
        env:
          PROXY_NODE: ${{ secrets.XSERVER_PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi

          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray && chmod +x xray/xray

          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote, urlparse

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] PROXY_NODE 为空")
              sys.exit(1)

          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("trojan://"):
              protocol = "trojan"
              content = url[9:]
          elif url.startswith("ss://"):
              protocol = "ss"
              content = url[5:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              protocol = "socks5"
              content = url.split("://")[1].split("#")[0]
              if "@" in content:
                  server = content.split("@")[1].split(":")[0]
              else:
                  server = content.split(":")[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w") as f:
                  f.write(url.split("#")[0])
              sys.exit(0)
          else:
              print(f"[ERROR] 不支持的协议: {url.split('://')[0]}")
              sys.exit(1)

          if "#" in content:
              content = content.rsplit("#", 1)[0]

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 10808, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 10809, "listen": "127.0.0.1", "protocol": "http"}
              ],
              "outbounds": []
          }

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""
              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"
              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              host = params.get("host", [sni])[0]
              path_val = unquote(params.get("path", ["/"])[0])
              print(f"[INFO] VLESS -> {mask(address)}:{port} (security: {security}, network: {network})")
              outbound = {
                  "protocol": "vless",
                  "settings": {"vnext": [{"address": address, "port": int(port), "users": [{"id": uuid, "encryption": "none"}]}]},
                  "streamSettings": {"network": network, "security": security}
              }
              if flow:
                  outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow
              if security == "reality":
                  outbound["streamSettings"]["realitySettings"] = {"serverName": sni, "fingerprint": fp, "publicKey": pbk}
              elif security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {"serverName": sni, "fingerprint": fp, "allowInsecure": False}
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": path_val, "headers": {"Host": host}}
              elif network == "grpc":
                  service_name = params.get("serviceName", [""])[0]
                  outbound["streamSettings"]["grpcSettings"] = {"serviceName": service_name}
              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              try:
                  padding = 4 - len(content) % 4
                  if padding != 4:
                      content += "=" * padding
                  decoded = base64.b64decode(content).decode("utf-8")
                  vm = json.loads(decoded)
              except Exception as e:
                  print(f"[ERROR] VMess 解析失败: {e}")
                  sys.exit(1)
              address = vm.get("add", "")
              port = int(vm.get("port", 443))
              uuid = vm.get("id", "")
              aid = int(vm.get("aid", 0))
              network = vm.get("net", "tcp")
              tls = vm.get("tls", "")
              sni = vm.get("sni", "") or vm.get("host", address)
              host = vm.get("host", address)
              path_val = vm.get("path", "/")
              fp = vm.get("fp", "chrome")
              print(f"[INFO] VMess -> {mask(address)}:{port} (network: {network}, tls: {tls})")
              outbound = {
                  "protocol": "vmess",
                  "settings": {"vnext": [{"address": address, "port": port, "users": [{"id": uuid, "alterId": aid, "security": "auto"}]}]},
                  "streamSettings": {"network": network, "security": "tls" if tls == "tls" else "none"}
              }
              if tls == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {"serverName": sni, "fingerprint": fp, "allowInsecure": False}
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": path_val, "headers": {"Host": host}}
              config["outbounds"].append(outbound)

          elif protocol == "trojan":
              password, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""
              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"
              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              network = params.get("type", ["tcp"])[0]
              host = params.get("host", [sni])[0]
              path_val = unquote(params.get("path", ["/"])[0])
              fp = params.get("fp", ["chrome"])[0]
              print(f"[INFO] Trojan -> {mask(address)}:{port} (network: {network})")
              outbound = {
                  "protocol": "trojan",
                  "settings": {"servers": [{"address": address, "port": int(port), "password": password}]},
                  "streamSettings": {"network": network, "security": "tls", "tlsSettings": {"serverName": sni, "fingerprint": fp, "allowInsecure": False}}
              }
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": path_val, "headers": {"Host": host}}
              config["outbounds"].append(outbound)

          elif protocol == "ss":
              try:
                  if "@" in content:
                      encoded, server_part = content.split("@", 1)
                      decoded = base64.b64decode(encoded + "==").decode("utf-8")
                      method, password = decoded.split(":", 1)
                      address, port = server_part.split(":", 1)
                  else:
                      decoded = base64.b64decode(content + "==").decode("utf-8")
                      if "@" in decoded:
                          user_part, server_part = decoded.split("@", 1)
                          method, password = user_part.split(":", 1)
                          address, port = server_part.split(":", 1)
                      else:
                          raise ValueError("无法解析")
              except Exception as e:
                  print(f"[ERROR] Shadowsocks 解析失败: {e}")
                  sys.exit(1)
              print(f"[INFO] Shadowsocks -> {mask(address)}:{port}")
              outbound = {
                  "protocol": "shadowsocks",
                  "settings": {"servers": [{"address": address, "port": int(port), "method": method, "password": password}]}
              }
              config["outbounds"].append(outbound)

          with open("xray_config.json", "w") as f:
              json.dump(config, f, indent=2)
          print("[INFO] ✅ 代理配置已生成")
          PYEOF

          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SOCKS5=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x socks5://127.0.0.1:10808 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "PROXY_SOCKS5=socks5://127.0.0.1:10808" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done

          echo "[ERROR] ❌ 代理连接失败"
          cat xray.log
          exit 1

      - name: 运行续期脚本
        working-directory: scripts/XServer
        env:
          XSERVER_ACCOUNT: ${{ secrets.XSERVER_ACCOUNT }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SOCKS5: ${{ env.PROXY_SOCKS5 }}
        run: node main.js

      - name: 拉取当前工作流仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}
          path: self-repo

      - name: 自动修改下一次运行时间
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
          WORKFLOW_FILE: self-repo/.github/workflows/XServer.yml
        run: |
          python3 << 'EOF'
          import re
          import random
          import os
          from datetime import datetime, timedelta

          workflow_file = os.environ.get("WORKFLOW_FILE")
          # Node.js 脚本保存日期的文件路径
          date_file = 'scripts/XServer/next_time.txt'

          target_date = None
          
          # 1. 尝试读取 Node.js 抓取到的网页日期
          if os.path.exists(date_file):
              with open(date_file, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # 正则提取类似 "2026年03月27日" 或 "2026-03-27" 中的年、月、日
              dates = re.findall(r'(\d{4})[^\d]+(\d{1,2})[^\d]+(\d{1,2})', content)
              valid_dates = []
              for y, m, d in dates:
                  try:
                      valid_dates.append(datetime(int(y), int(m), int(d)))
                  except: pass
              
              if valid_dates:
                  target_date = min(valid_dates) # 如果有多个账号，取最近需要续期的时间

          # 2. 计算 Cron 表达式 (分钟和小时依旧随机，避免风控)
          random_minute = random.randint(0, 59)
          random_hour = random.randint(5, 7) # UTC 5~7点

          if target_date:
              # 如果抓到了国定续期时间，就直接定死在那一天的那个月！
              cron_month = target_date.month
              cron_day = target_date.day
              next_date_str = f"{target_date.strftime('%Y-%m-%d')} {random_hour:02d}:{random_minute:02d}"
              new_cron = f"{random_minute} {random_hour} {cron_day} {cron_month} *"
          else:
              # 兜底方案：如果没抓到时间（比如刚才没遇到延期提示），默认明天再运行一次去抓取
              tomorrow = datetime.utcnow() + timedelta(days=1)
              next_date_str = f"{tomorrow.strftime('%Y-%m-%d')} {random_hour:02d}:{random_minute:02d}"
              new_cron = f"{random_minute} {random_hour} * * *"

          # 3. 写入并替换 yml 文件
          try:
              with open(workflow_file, 'r', encoding='utf-8') as f:
                  content = f.read()

              new_content = re.sub(
                  r"- cron: '.*?'",
                  f"- cron: '{new_cron}' # 下一个: {next_date_str} UTC",
                  content,
                  count=1
              )

              with open(workflow_file, 'w', encoding='utf-8') as f:
                  f.write(new_content)
              print(f"✅ 已精准将下一次运行时间更新为: {new_cron} (目标日期: {next_date_str})")
          except Exception as e:
              print(f"❌ 修改文件失败，请检查路径: {e}")
              exit(1)
          EOF

          cd self-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/XServer.yml
          git commit -m "🚀 auto: 根据网页提示精准更新下一次续期时间" || echo "没有变更需要提交"
          
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push

      - name: 清理旧运行
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
