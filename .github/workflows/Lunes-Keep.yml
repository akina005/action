name: Lunes Host 自动保活

on:
  schedule:
    # 每10天运行：1号、11号、21号 09:15 (北京时间)
    - cron: '14 1 1,11,21 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    concurrency:
      group: lunes-keepalive
      cancel-in-progress: false

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb unzip
          pip install seleniumbase>=4.25.0 pyvirtualdisplay>=3.0 requests>=2.31.0

      - name: 配置 Xray 代理 (Vless/Vmess)
        env:
          LUNES__PROXY_NODE: ${{ secrets.LUNES__PROXY_NODE }}
        run: |
          # 下载并解压 Xray-core
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray-core
          chmod +x xray-core/xray

          # 编写 Python 脚本自动将链接解析为 Xray JSON 配置
          cat << 'EOF' > generate_config.py
          import os, sys, json, base64, urllib.parse

          node_url = os.environ.get('LUNES__PROXY_NODE', '').strip()
          if not node_url:
              sys.exit("未找到 LUNES__PROXY_NODE 环境变量，请在 Secrets 中添加")

          outbound = {}
          if node_url.startswith('vmess://'):
              b64_str = node_url[8:]
              b64_str += "=" * ((4 - len(b64_str) % 4) % 4)
              v = json.loads(base64.urlsafe_b64decode(b64_str).decode('utf-8'))
              
              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": v.get("add", ""),
                          "port": int(v.get("port", 443)),
                          "users": [{"id": v.get("id", ""), "alterId": int(v.get("aid", 0)), "security": v.get("scy", "auto")}]
                      }]
                  }
              }
              tls_val = str(v.get("tls", "")).lower()
              stream_settings = {
                  "network": v.get("net", "tcp"),
                  "security": "tls" if tls_val in ["tls", "1", "true"] else "none"
              }
              if stream_settings["security"] == "tls":
                  stream_settings["tlsSettings"] = {"serverName": v.get("sni", v.get("host", ""))}
              
              if stream_settings["network"] == "ws":
                  stream_settings["wsSettings"] = {"path": v.get("path", "/"), "headers": {"Host": v.get("host", "")}}
              elif stream_settings["network"] == "grpc":
                  stream_settings["grpcSettings"] = {"serviceName": v.get("path", "")}
                  
              outbound["streamSettings"] = stream_settings

          elif node_url.startswith('vless://'):
              parsed = urllib.parse.urlparse(node_url)
              qs = urllib.parse.parse_qs(parsed.query)
              
              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": parsed.hostname,
                          "port": int(parsed.port or 443),
                          "users": [{"id": parsed.username, "encryption": qs.get("encryption", ["none"])[0]}]
                      }]
                  }
              }
              stream_settings = {
                  "network": qs.get("type", ["tcp"])[0],
                  "security": qs.get("security", ["none"])[0]
              }
              
              if stream_settings["security"] in ["tls", "reality"]:
                  sec_settings = {"serverName": qs.get("sni", [""])[0]}
                  if stream_settings["security"] == "reality":
                      sec_settings.update({
                          "publicKey": qs.get("pbk", [""])[0],
                          "shortId": qs.get("sid", [""])[0],
                          "spiderX": qs.get("spx", [""])[0]
                      })
                  stream_settings[f'{stream_settings["security"]}Settings'] = sec_settings

              if stream_settings["network"] == "ws":
                  stream_settings["wsSettings"] = {"path": qs.get("path", ["/"])[0], "headers": {"Host": qs.get("host", [""])[0]} if qs.get("host") else {}}
              elif stream_settings["network"] == "grpc":
                  stream_settings["grpcSettings"] = {"serviceName": qs.get("serviceName", [""])[0]}
                  
              outbound["streamSettings"] = stream_settings
          else:
              sys.exit("代理协议不受支持：仅支持 vmess:// 或 vless:// 节点链接")

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{"port": 7890, "protocol": "http", "listen": "127.0.0.1"}],
              "outbounds": [outbound, {"protocol": "freedom", "tag": "direct"}]
          }

          with open('config.json', 'w') as f:
              json.dump(config, f, indent=2)
          print("Xray 配置解析并生成成功")
          EOF

          # 生成配置并后台启动 Xray 代理
          python3 generate_config.py
          ./xray-core/xray run -c config.json &
          sleep 3

      - name: 执行保活
        env:
#         LUNES_EMAIL: ${{ secrets.LUNES_EMAIL }}
#         LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}
          LUNES_1: ${{ secrets.LUNES_1 }}
          LUNES_2: ${{ secrets.LUNES_2 }}
          LUNES_3: ${{ secrets.LUNES_3 }}
          LUNES_4: ${{ secrets.LUNES_4 }}
          LUNES_5: ${{ secrets.LUNES_5 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: http://127.0.0.1:7890
        run: python scripts/Lunes/Lunes-Keep.py

#     - name: 上传截图
#       uses: actions/upload-artifact@v4
#       if: always()
#       with:
#         name: screenshots-${{ github.run_number }}
#         path: output/screenshots/
#         retention-days: 3

      - name: 清理旧运行
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
