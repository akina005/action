name: TheBerryHost 每日领取

on:
  workflow_dispatch:
  schedule:
    - cron: '46 0 * * *'  

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 1. 拉取私有仓库代码
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 🐍 2. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ 3. 安装依赖
        run: |
          sudo apt-get update && sudo apt-get install -y unzip
          pip install requests

      - name: 🛡️ 4. 安装并启动 Xray 代理
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then
            echo "[INFO] 未配置 PROXY_URL，跳过代理"
            exit 0
          fi
          
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray && chmod +x xray/xray
          
          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote, urlparse

          url = os.environ.get("PROXY_URL", "").strip()
          if not url: sys.exit(0)

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{"port": 10808, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}}],
              "outbounds": []
          }

          if url.startswith(("socks5://", "socks://")):
              with open("use_external_socks.txt", "w") as f: f.write(url.split("#")[0])
              sys.exit(0)

          try:
              if url.startswith("vless://"):
                  p = urlparse(url); qs = parse_qs(p.query)
                  net, sec = qs.get("type", ["tcp"])[0], qs.get("security", ["none"])[0]
                  user = {"id": p.username, "encryption": qs.get("encryption", ["none"])[0]}
                  flow = qs.get("flow", [""])[0]
                  if flow:
                      user["flow"] = flow

                  out = {
                      "protocol": "vless",
                      "settings": {"vnext": [{"address": p.hostname, "port": p.port or 443, "users": [user]}]},
                      "streamSettings": {"network": net, "security": sec}
                  }

                  if sec == "tls":
                      tls = {
                          "serverName": qs.get("sni", [p.hostname])[0],
                          "fingerprint": qs.get("fp", ["chrome"])[0],
                          "allowInsecure": qs.get("allowInsecure", qs.get("insecure", ["0"]))[0] == "1"
                      }
                      alpn = qs.get("alpn", [""])[0]
                      if alpn:
                          tls["alpn"] = [x.strip() for x in alpn.split(",") if x.strip()]
                      out["streamSettings"]["tlsSettings"] = tls

                  elif sec == "reality":
                      reality = {
                          "serverName": qs.get("sni", [p.hostname])[0],
                          "fingerprint": qs.get("fp", ["chrome"])[0],
                          "publicKey": qs.get("pbk", [""])[0]
                      }
                      short_id = qs.get("sid", qs.get("shortId", [""]))[0]
                      if short_id:
                          reality["shortId"] = short_id
                      spider_x = qs.get("spx", [""])[0]
                      if spider_x:
                          reality["spiderX"] = unquote(spider_x)
                      out["streamSettings"]["realitySettings"] = reality

                  if net == "ws":
                      out["streamSettings"]["wsSettings"] = {"path": unquote(qs.get("path", ["/"])[0]), "headers": {"Host": qs.get("host", [p.hostname])[0]}}
                  config["outbounds"].append(out)

              elif url.startswith("vmess://"):
                  v = json.loads(base64.b64decode(url[8:].split("#")[0] + "==").decode("utf-8"))
                  out = {
                      "protocol": "vmess",
                      "settings": {"vnext": [{"address": v["add"], "port": int(v["port"]), "users": [{"id": v["id"], "alterId": int(v.get("aid", 0))}]}]},
                      "streamSettings": {"network": v.get("net", "tcp"), "security": v.get("tls", "none")}
                  }
                  if v.get("net") == "ws":
                      out["streamSettings"]["wsSettings"] = {"path": v.get("path", "/"), "headers": {"Host": v.get("host", v["add"])}}
                  config["outbounds"].append(out)

              elif url.startswith("trojan://"):
                  p = urlparse(url); qs = parse_qs(p.query)
                  config["outbounds"].append({
                      "protocol": "trojan",
                      "settings": {"servers": [{"address": p.hostname, "port": p.port or 443, "password": p.username}]},
                      "streamSettings": {"network": qs.get("type", ["tcp"])[0], "security": "tls", "tlsSettings": {"serverName": qs.get("sni", [p.hostname])[0]}}
                  })

              with open("xray_config.json", "w") as f: json.dump(config, f, indent=2)
          except Exception as e:
              sys.exit(1)
          PYEOF
          
          if [ -f "use_external_socks.txt" ]; then
            echo "PROXY_SOCKS5=$(cat use_external_socks.txt)" >> $GITHUB_ENV
          else
            ./xray/xray run -c xray_config.json > xray.log 2>&1 &
            sleep 8
            if curl -x socks5://127.0.0.1:10808 -sI --max-time 15 https://www.google.com > /dev/null; then
              echo "PROXY_SOCKS5=socks5://127.0.0.1:10808" >> $GITHUB_ENV
            else
              cat xray.log && exit 1
            fi
          fi

      - name: 🎮 5. 执行每日领取
        # --- 路径已更新为 scripts/TheBerry ---
        working-directory: scripts/TheBerry
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          TG_BOT: ${{ secrets.TG_BOT }}
          PROXY_SOCKS5: ${{ env.PROXY_SOCKS5 }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          chmod +x berryhost.sh
          bash berryhost.sh

      - name: 🧹 6. 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1
