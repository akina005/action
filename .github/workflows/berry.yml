name: TheBerryHost 每日领取

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 01:00 (北京 09:00)

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 1. 拉取私有仓库代码
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 🛡️ 2. 启动 Gost 代理转发
        # 仅在配置了 GOST_PROXY 时运行
        if: secrets.GOST_PROXY != ''
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          mv gost-linux-amd64-2.11.5 gost
          
          # 启动代理并记录日志
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 5
          
          echo "✅ Gost 代理已启动，测试中..."
          if curl -s -x http://127.0.0.1:8080 --max-time 10 https://api.ipify.org; then
            echo -e "\n[INFO] 代理连接成功"
          else
            echo -e "\n[ERROR] 代理连接失败"
            exit 1
          fi

      - name: 🎮 3. 执行每日领取
        # 根据截图设置工作目录
        working-directory: scripts/berry
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          # 统一使用新的 TG 变量名
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          chmod +x berryhost.sh
          bash berryhost.sh

      - name: 🧹 4. 清理旧运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
