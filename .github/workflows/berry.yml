name: TheBerryHost 每日领取

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 01:00 (北京 09:00)

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 1. 拉取私有仓库代码
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 🛡️ 2. 启动 Gost 代理转发
        env:
          # 先在这里注入，方便下一步 if 判断
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        # 使用你测试通过的判断语法
        if: env.GOST_PROXY != ''
        run: |
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          mv gost-linux-amd64-2.11.5 gost
          
          # 直接使用注入好的环境变量，安全又整洁
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 5
          
          echo "✅ Gost 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 --max-time 15 https://api.ipify.org || echo "代理测试异常，尝试继续..."

      - name: 🎮 3. 执行每日领取
        working-directory: scripts/berry
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          chmod +x berryhost.sh
          bash berryhost.sh

      - name: 🧹 4. 清理旧运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
