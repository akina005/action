name: FreeMcServer 续期

on:
  schedule:
    # 每 3 小时 30 分运行一次
    - cron: '30 */3 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取私有仓库代码
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb unzip
          pip install seleniumbase>=4.25.0 pyvirtualdisplay>=3.0 requests>=2.31.0

      - name: 配置代理
        env:
          freemc_PROXY_NODE: ${{ secrets.freemc_PROXY_NODE }}
        run: |
          if [ -z "$freemc_PROXY_NODE" ]; then
            echo "INFO: 无代理配置，使用直连模式"
            exit 0
          fi
          
          echo "INFO: 下载并配置 Xray-core"
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O xray.zip
          unzip -q xray.zip xray
          chmod +x xray
          
          # 使用 Python 自动解析 VLESS 链接并生成 Xray JSON 配置文件
          python -c '
          import os, urllib.parse, json
          
          link = os.environ.get("freemc_PROXY_NODE", "").strip()
          if not link.startswith("vless://"):
              print("ERROR: 不是有效的 VLESS 链接")
              exit(1)
          
          parsed = urllib.parse.urlparse(link)
          uuid = parsed.username
          host = parsed.hostname
          port = int(parsed.port or 443)
          params = dict(urllib.parse.parse_qsl(parsed.query))
          
          outbound = {
              "protocol": "vless",
              "settings": {
                  "vnext": [{
                      "address": host,
                      "port": port,
                      "users": [{"id": uuid, "encryption": params.get("encryption", "none"), "flow": params.get("flow", "")}]
                  }]
              },
              "streamSettings": {
                  "network": params.get("type", "tcp"),
                  "security": params.get("security", "none")
              }
          }
          
          if params.get("security") == "tls":
              outbound["streamSettings"]["tlsSettings"] = {
                  "serverName": params.get("sni", host),
                  "fingerprint": params.get("fp", "chrome")
              }
          elif params.get("security") == "reality":
              outbound["streamSettings"]["realitySettings"] = {
                  "serverName": params.get("sni", host),
                  "publicKey": params.get("pbk", ""),
                  "fingerprint": params.get("fp", "chrome"),
                  "shortId": params.get("sid", ""),
                  "spiderX": params.get("spx", "")
              }
          
          if params.get("type") == "ws":
              outbound["streamSettings"]["wsSettings"] = {
                  "path": params.get("path", "/"),
                  "headers": {"Host": params.get("host", host)}
              }
          elif params.get("type") == "grpc":
              outbound["streamSettings"]["grpcSettings"] = {
                  "serviceName": params.get("serviceName", ""),
                  "multiMode": params.get("mode", "multi") != "gun"
              }
          
          config = {
              "inbounds": [{
                  "port": 1080,
                  "listen": "127.0.0.1",
                  "protocol": "http",
                  "settings": {}
              }],
              "outbounds": [outbound]
          }
          
          with open("config.json", "w") as f:
              json.dump(config, f, indent=2)
          '
          
          echo "INFO: 启动 VLESS 代理"
          ./xray -c config.json > /dev/null 2>&1 &
          sleep 3
          echo "PROXY_SERVER=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "INFO: 代理已成功启动"

      - name: 执行续订脚本
        env:
          FREEMCSERVER: ${{ secrets.FREEMCSERVER }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          cd scripts/FreeMcServer
          python main.py

      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: scripts/FreeMcServer/output/screenshots/
          retention-days: 3

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 5
