name: H2play Auto Renew 

on:
  workflow_dispatch:
  #schedule:
  # - cron: '0 */3 * * *'

# 只保留最近 10 次运行记录
run-name: "H2play Renew - ${{ github.run_number }}"

jobs:
  run-renew:
    runs-on: ubuntu-latest

    steps:
      - name: 清理旧的 workflow 运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 10
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download Script from Private Repo
        run: |
          echo "从私库下载脚本..."
          curl -H "Authorization: token ${{ secrets.REPO_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -o main.py \
               -L https://api.github.com/repos/akina005/scripts/contents/scripts/host2play/main.py
          echo "脚本下载完成"

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb ffmpeg unzip wget curl > /dev/null 2>&1
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add - > /dev/null 2>&1
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable > /dev/null 2>&1
          echo "系统依赖安装完成"

      - name: 🛡️ 解析并启动代理节点
        run: |
          wget -q https://github.com/v2fly/v2ray-core/releases/download/v5.16.1/v2ray-linux-64.zip
          unzip -q v2ray-linux-64.zip -d v2ray
          chmod +x v2ray/v2ray
          
          echo "解析节点配置..."
          NODE="${{ secrets.H2play_PROXY_NODE }}"
          
          # 判断节点类型并生成配置
          if [[ $NODE == vless://* ]]; then
            echo "检测到 VLESS 节点"
            
            # 解析 vless 链接
            NODE_DATA=$(echo $NODE | sed 's/vless:\/\///')
            UUID=$(echo $NODE_DATA | cut -d'@' -f1)
            SERVER_INFO=$(echo $NODE_DATA | cut -d'@' -f2 | cut -d'?' -f1)
            ADDRESS=$(echo $SERVER_INFO | cut -d':' -f1)
            PORT=$(echo $SERVER_INFO | cut -d':' -f2)
            
            # 解析查询参数
            PARAMS=$(echo $NODE_DATA | cut -d'?' -f2 | cut -d'#' -f1)
            
            # 提取各个参数
            FLOW=$(echo "$PARAMS" | grep -oP 'flow=\K[^&]+' || echo "")
            SECURITY=$(echo "$PARAMS" | grep -oP 'security=\K[^&]+' || echo "")
            SNI=$(echo "$PARAMS" | grep -oP 'sni=\K[^&]+' || echo "")
            FP=$(echo "$PARAMS" | grep -oP 'fp=\K[^&]+' || echo "")
            PBK=$(echo "$PARAMS" | grep -oP 'pbk=\K[^&]+' || echo "")
            
            echo "节点已解析完成"
            
            # 根据 security 类型生成配置
            if [[ "$SECURITY" == "reality" ]]; then
              cat > config.json << EOF
          {
            "inbounds": [{
              "port": 8080,
              "protocol": "http",
              "settings": {}
            }],
            "outbounds": [{
              "protocol": "vless",
              "settings": {
                "vnext": [{
                  "address": "$ADDRESS",
                  "port": $PORT,
                  "users": [{
                    "id": "$UUID",
                    "encryption": "none",
                    "flow": "$FLOW"
                  }]
                }]
              },
              "streamSettings": {
                "network": "tcp",
                "security": "reality",
                "realitySettings": {
                  "show": false,
                  "fingerprint": "$FP",
                  "serverName": "$SNI",
                  "publicKey": "$PBK",
                  "shortId": ""
                }
              }
            }]
          }
          EOF
            elif [[ "$SECURITY" == "tls" ]]; then
              cat > config.json << EOF
          {
            "inbounds": [{
              "port": 8080,
              "protocol": "http",
              "settings": {}
            }],
            "outbounds": [{
              "protocol": "vless",
              "settings": {
                "vnext": [{
                  "address": "$ADDRESS",
                  "port": $PORT,
                  "users": [{
                    "id": "$UUID",
                    "encryption": "none",
                    "flow": "$FLOW"
                  }]
                }]
              },
              "streamSettings": {
                "network": "tcp",
                "security": "tls",
                "tlsSettings": {
                  "serverName": "$SNI",
                  "fingerprint": "$FP"
                }
              }
            }]
          }
          EOF
            else
              cat > config.json << EOF
          {
            "inbounds": [{
              "port": 8080,
              "protocol": "http",
              "settings": {}
            }],
            "outbounds": [{
              "protocol": "vless",
              "settings": {
                "vnext": [{
                  "address": "$ADDRESS",
                  "port": $PORT,
                  "users": [{
                    "id": "$UUID",
                    "encryption": "none"
                  }]
                }]
              },
              "streamSettings": {
                "network": "tcp"
              }
            }]
          }
          EOF
            fi
            
          elif [[ $NODE == vmess://* ]]; then
            echo "检测到 VMess 节点"
            NODE_DATA=$(echo $NODE | sed 's/vmess:\/\///' | base64 -d)
            
            cat > config.json << EOF
          {
            "inbounds": [{
              "port": 8080,
              "protocol": "http",
              "settings": {}
            }],
            "outbounds": [{
              "protocol": "vmess",
              "settings": {
                "vnext": [$NODE_DATA]
              }
            }]
          }
          EOF
          else
            echo "⚠️ 未识别的节点格式，使用直连"
            cat > config.json << EOF
          {
            "inbounds": [{
              "port": 8080,
              "protocol": "http",
              "settings": {}
            }],
            "outbounds": [{
              "protocol": "freedom"
            }]
          }
          EOF
          fi
          
          echo "启动 V2Ray..."
          nohup ./v2ray/v2ray run -c config.json > v2ray.log 2>&1 &
          sleep 5
          echo "代理服务已启动"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip > /dev/null 2>&1
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub > /dev/null 2>&1
          echo "Python 依赖安装完成"

      - name: Run Renew Script
        env:
          RENEW_URL: ${{ secrets.H2play_RENEW_URL }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY: http://127.0.0.1:8080
        run: |
          python main.py
          echo "续期脚本执行完成"

      - name: 发送截图到 Telegram
        if: always()
        run: |
          if [ -f "final_screenshot.png" ]; then
            curl -F chat_id="${{ secrets.TG_CHAT_ID }}" \
                 -F photo=@final_screenshot.png \
                 -F caption="H2play 续期结果截图" \
                 https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendPhoto
            echo "截图已发送到 Telegram"
          else
            echo "未找到截图文件"
          fi
