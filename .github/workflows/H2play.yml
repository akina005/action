name: H2play Auto Renew 

on:
  schedule:
    - cron: '0 0,11,22 * * *'    # 触发点: 00:00, 11:00, 22:00
    - cron: '30 5,16 * * *'      # 触发点: 05:30, 16:30
  workflow_dispatch:

jobs:
  run-renew:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: write

    steps:
      - name: 清理旧的 workflow 运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 10
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Script from Private Repo
        run: |
          echo "从私库下载脚本..."
          curl -H "Authorization: token ${{ secrets.REPO_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -o main.py \
               -L https://api.github.com/repos/akina005/scripts/contents/scripts/host2play/main.py
          echo "脚本下载完成"

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb ffmpeg wget curl fonts-noto-cjk fonts-wqy-zenhei fonts-wqy-microhei > /dev/null 2>&1
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add - > /dev/null 2>&1
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable > /dev/null 2>&1
          echo "系统依赖安装完成"

      - name: 启用 WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 配置 DNS
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\noptions timeout:2 attempts:3" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 3
          echo "🌍 当前出口信息："
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'warp=|ip=|loc='

      - name: 验证 WARP
        run: |
          for i in {1..30}; do
            status=$(curl -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace | grep -oP 'warp=\K\w+' || echo "unknown")
            [[ "$status" =~ ^(on|plus)$ ]] && echo "✅ WARP 已连接" && break
            echo "⏳ WARP 连接中... ($i/30)"
            sleep 2
          done

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip > /dev/null 2>&1
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub > /dev/null 2>&1
          echo "Python 依赖安装完成"

      - name: Run Renew Script
        env:
          RENEW_URL: ${{ secrets.H2play_RENEW_URL }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python main.py
          echo "续期脚本执行完成"
