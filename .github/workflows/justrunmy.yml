name: JustRunMy Auto Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
  repository_dispatch:
    types: [just]

# ⚠️ 必须添加权限配置，允许 Action 修改仓库文件
permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests
        
    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: Setup Proxy Tunnel (Gost)
      env:
        PROXY_URL: ${{ secrets.PROXY }} 
      run: |
        wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
        gunzip gost-linux-amd64-2.11.5.gz
        chmod +x gost-linux-amd64-2.11.5
        nohup ./gost-linux-amd64-2.11.5 -L :1080 -F "${PROXY_URL}" > gost.log 2>&1 &
        sleep 5
        curl -il -x socks5://127.0.0.1:1080 https://api.ipify.org

    - name: Run Script
      env:
        PROXY: socks5://127.0.0.1:1080
        TG_TOKEN: ${{ secrets.TG_TOKEN }}      # 映射 Secret
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  # 映射 Secret
      run: |
        # 使用 xvfb 运行以支持强力过人机验证模式
        xvfb-run -a python just.py

    # 👇 新增步骤：将更新后的 cookie.txt 提交回仓库
    - name: Commit and Push Cookie Update
      if: success() # 只有脚本运行成功才提交
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # 检查 cookie.txt 是否有变化
        if [[ -n $(git status -s cookie.txt) ]]; then
          echo "检测到 Cookie 更新，正在提交..."
          git add cookie.txt
          git commit -m "Auto-update auth cookie [skip ci]"
          git push
        else
          echo "Cookie 无变化，跳过提交。"
        fi

    - name: Upload Debug Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: justrun-debug
        path: artifacts/
        retention-days: 5
