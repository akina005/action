name: FreezeHost 自动续期

on:
  schedule:
    - cron: '18 15 21 4 *' # 下一个: 2026-04-21 15:18 UTC (到期前2天自动执行)
  workflow_dispatch:

jobs:
  renew:
    name: 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write

    steps:
      - name: 📥 拉取当前配置仓库
        uses: actions/checkout@v4
        with:
          # 使用你截图中的 REPO_TOKEN
          token: ${{ secrets.REPO_TOKEN }}

      - name: 📥 拉取私有脚本库
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: scripts_repo

      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 安装依赖
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: 安装并启动代理
        env:
          FREEZE_PROXY_NODE: ${{ secrets.FREEZE_PROXY_NODE }}
        run: |
          if [ -z "$FREEZE_PROXY_NODE" ]; then
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi

          wget -q https://github.com/oyz6/action/releases/download/proxy/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray && chmod +x xray/xray

          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote, urlparse

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("FREEZE_PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] FREEZE_PROXY_NODE 为空")
              sys.exit(1)

          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("trojan://"):
              protocol = "trojan"
              content = url[9:]
          elif url.startswith("ss://"):
              protocol = "ss"
              content = url[5:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              protocol = "socks5"
              content = url.split("://")[1].split("#")[0]
              if "@" in content:
                  server = content.split("@")[1].split(":")[0]
              else:
                  server = content.split(":")[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w") as f:
                  f.write(url.split("#")[0])
              sys.exit(0)
          else:
              print(f"[ERROR] 不支持的协议: {url.split('://')[0]}")
              sys.exit(1)

          if "#" in content:
              content = content.rsplit("#", 1)[0]

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 1080, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 1081, "listen": "127.0.0.1", "protocol": "http"}
              ],
              "outbounds": []
          }

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])

              print(f"[INFO] VLESS -> {mask(address)}:{port} (security: {security}, network: {network})")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": int(port),
                          "users": [{"id": uuid, "encryption": "none"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": security
                  }
              }

              if flow:
                  outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow

              if security == "reality":
                  outbound["streamSettings"]["realitySettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "publicKey": pbk
                  }
              elif security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False
                  }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }
              elif network == "grpc":
                  service_name = params.get("serviceName", [""])[0]
                  outbound["streamSettings"]["grpcSettings"] = {
                      "serviceName": service_name
                  }

              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              try:
                  padding = 4 - len(content) % 4
                  if padding != 4:
                      content += "=" * padding
                  decoded = base64.b64decode(content).decode("utf-8")
                  vm = json.loads(decoded)
              except Exception as e:
                  print(f"[ERROR] VMess 解析失败: {e}")
                  sys.exit(1)

              address = vm.get("add", "")
              port = int(vm.get("port", 443))
              uuid = vm.get("id", "")
              aid = int(vm.get("aid", 0))
              network = vm.get("net", "tcp")
              tls = vm.get("tls", "")
              sni = vm.get("sni", "") or vm.get("host", address)
              host = vm.get("host", address)
              path = vm.get("path", "/")
              fp = vm.get("fp", "chrome")

              print(f"[INFO] VMess -> {mask(address)}:{port} (network: {network}, tls: {tls})")

              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": port,
                          "users": [{"id": uuid, "alterId": aid, "security": "auto"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls" if tls == "tls" else "none"
                  }
              }

              if tls == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False
                  }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }

              config["outbounds"].append(outbound)

          elif protocol == "trojan":
              password, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              network = params.get("type", ["tcp"])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              fp = params.get("fp", ["chrome"])[0]

              print(f"[INFO] Trojan -> {mask(address)}:{port} (network: {network})")

              outbound = {
                  "protocol": "trojan",
                  "settings": {
                      "servers": [{
                          "address": address,
                          "port": int(port),
                          "password": password
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls",
                      "tlsSettings": {
                          "serverName": sni,
                          "fingerprint": fp,
                          "allowInsecure": False
                      }
                  }
              }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }

              config["outbounds"].append(outbound)

          elif protocol == "ss":
              try:
                  if "@" in content:
                      encoded, server_part = content.split("@", 1)
                      decoded = base64.b64decode(encoded + "==").decode("utf-8")
                      method, password = decoded.split(":", 1)
                      address, port = server_part.split(":", 1)
                  else:
                      decoded = base64.b64decode(content + "==").decode("utf-8")
                      if "@" in decoded:
                          user_part, server_part = decoded.split("@", 1)
                          method, password = user_part.split(":", 1)
                          address, port = server_part.split(":", 1)
                      else:
                          raise ValueError("无法解析")
              except Exception as e:
                  print(f"[ERROR] Shadowsocks 解析失败: {e}")
                  sys.exit(1)

              print(f"[INFO] Shadowsocks -> {mask(address)}:{port}")

              outbound = {
                  "protocol": "shadowsocks",
                  "settings": {
                      "servers": [{
                          "address": address,
                          "port": int(port),
                          "method": method,
                          "password": password
                      }]
                  }
              }

              config["outbounds"].append(outbound)

          with open("xray_config.json", "w") as f:
              json.dump(config, f, indent=2)

          print("[INFO] ✅ 代理配置已生成")
          PYEOF

          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SERVER=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x socks5://127.0.0.1:1080 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done

          echo "[ERROR] ❌ 代理连接失败"
          cat xray.log
          exit 1

      - name: 🔧 修复 DNS
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

      - name: 🚀 运行续期脚本
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FREEZE_PROXY_NODE: ${{ env.PROXY_SERVER }}
        run: python scripts_repo/scripts/freezehost/renew.py

      - name: ⚙️ 自动修改下一次运行时间
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
          WORKFLOW_FILE: .github/workflows/FreezeHost_Renew.yml
        run: |
          set -e

          python3 << 'EOF'
          import os
          import re
          import sys
          from datetime import datetime, timedelta, timezone

          workflow_file = os.environ.get("WORKFLOW_FILE")
          date_file = 'next_time.txt'
          now_utc = datetime.now(timezone.utc)
          target_date = None

          if os.path.exists(date_file):
              with open(date_file, 'r', encoding='utf-8') as f:
                  content = f.read().upper()

              d_match = re.search(r'(\d+)\s*DAY', content)
              h_match = re.search(r'(\d+\.?\d*)\s*HOUR', content)

              days = int(d_match.group(1)) if d_match else 0
              hours = float(h_match.group(1)) if h_match else 0

              expire_time = now_utc + timedelta(days=days, hours=hours)
              target_date = expire_time - timedelta(days=2)

          if not target_date or target_date <= now_utc:
              target_date = now_utc + timedelta(hours=12)
              reason = "时间不足或解析失败，12h后重试"
          else:
              reason = "到期前2天自动执行"

          new_cron = f"{target_date.minute} {target_date.hour} {target_date.day} {target_date.month} *"
          next_date_str = f"{target_date.strftime('%Y-%m-%d %H:%M')} UTC ({reason})"

          if not os.path.exists(workflow_file):
              print(f"❌ 找不到文件: {workflow_file}")
              sys.exit(1)

          with open(workflow_file, 'r', encoding='utf-8') as f:
              workflow_content = f.read()

          # 替换 schedule 里的 cron 行，并同步更新注释里的下次执行时间。
          cron_pattern = r"(^\s*-\s+cron:\s*)'[^']+'(\s*#.*)?$"
          cron_replacement = rf"\1'{new_cron}' # 下一个: {next_date_str}"
          new_content, count = re.subn(
              cron_pattern,
              cron_replacement,
              workflow_content,
              count=1,
              flags=re.MULTILINE,
          )

          if count == 0:
              print("❌ 未找到可替换的 cron 行")
              sys.exit(1)

          with open(workflow_file, 'w', encoding='utf-8') as f:
              f.write(new_content)

          print(f"✅ 成功计算并更新计划: {new_cron}")
          EOF

          echo "[INFO] 检查 workflow 文件是否有变化..."
          if git diff --quiet -- "$WORKFLOW_FILE"; then
            echo "[INFO] 无变更"
          else
            echo "[INFO] 检测到变更，开始提交"
            git add "$WORKFLOW_FILE"
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit -m "auto: 调整下一次续期时间"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
            echo "[INFO] workflow 时间已自动更新"
          fi

      - name: 🧹 清理运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.REPO_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 5
