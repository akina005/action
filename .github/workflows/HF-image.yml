name: build-probe-image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'image name'
        required: true
        default: 'huggingface-app'
        type: string

jobs:
  build-and-push:
    name: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-buildx
        uses: docker/setup-buildx-action@v3

      - name: login-ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/huggingface/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: output-info
        run: |
          echo "Image pushed successfully:"
          echo "ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest"

  cleanup:
    name: cleanup
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    permissions:
      actions: write
    steps:
      - name: delete-runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
