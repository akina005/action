name: Katabump Renew

on:  
  schedule:
    - cron: '17 1 * * *'  # 每天运行一次（UTC时间 01:17）
  workflow_dispatch:  # 允许手动触发

jobs:
  auto_renew_katabump:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Interval Check (Strict 4-day cycle)
        id: check
        run: |
          # 如果是手动触发，则跳过检查直接运行
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 计算当前 Unix 天数 (UTC)
          DAYS=$(( $(date -u +%s) / 86400 ))
          REMAINDER=$(( $DAYS % 4 ))
          
          if [ $REMAINDER -eq 1 ]; then
            echo "Today is the scheduled day. Starting workflow..."
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "Not today. Skipping (Current remainder: $REMAINDER, Target: 1)."
            echo "run=false" >> $GITHUB_OUTPUT
          fi

   
      # 👇 修改 2：拉取私有仓库
      - name: 📥 拉取私有代码
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 👇 修改 3：加上工作目录，让系统能找到 requirements.txt
      - name: Install dependencies
        working-directory: scripts/Katabump
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y xvfb
          
      - name: Get Chromium Version
        id: get_version
        run: |
          CHROME_VERSION=$(chromium-browser --version 2>/dev/null | grep -oE 'Chromium\s[0-9]+' | grep -oE '[0-9]+')
          if [ -z "$CHROME_VERSION" ]; then
            CHROME_VERSION=$(google-chrome --version 2>/dev/null | grep -oE 'Chrome\s[0-9]+' | grep -oE '[0-9]+')
          fi
          if [ -z "$CHROME_VERSION" ]; then
            echo "⚠️ 无法自动检测浏览器版本，使用最新稳定版本。"
          CHROME_VERSION="144"
          fi
          echo "Detected Chrome/Chromium Major Version: $CHROME_VERSION"
          echo "CHROME_VERSION=$CHROME_VERSION" >> $GITHUB_ENV

      - name: Start X Virtual Frame Buffer (Xvfb)
        # 在后台启动 Xvfb，创建一个虚拟屏幕 :99
        run: Xvfb :99 -ac &

      # 👇 修改 4：加上工作目录，让系统能找到 renew_katabump.py
      - name: Run Script in Stealth Mode (via Xvfb)
        working-directory: scripts/Katabump
        env:
          DISPLAY: ':99'
          HEADLESS: 'false'
        run: |
          python renew_katabump.py
