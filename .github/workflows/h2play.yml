name: Host2Play Auto Renew 

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup environment
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          sudo -E apt-get update -qq
          sudo -E apt-get install -y -qq -o Dpkg::Use-Pty=0 p7zip-full 2>&1 | tail -5

      - name: Download Buster Extension
        run: |
          mkdir -p extensions/buster
          wget -qO extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip
          mkdir -p extensions/buster/unpacked
          7z x -y extensions/buster/buster.zip -oextensions/buster/unpacked > /dev/null

      - name: Download Scripts from Private Repository
        run: |
          curl -H "Authorization: token ${{ secrets.REPO_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -o renew.js \
               -L https://api.github.com/repos/akina005/scripts/contents/scripts/host2play/renew.js
          curl -H "Authorization: token ${{ secrets.REPO_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -o package.json \
               -L https://api.github.com/repos/akina005/scripts/contents/scripts/host2play/package.json

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Check if proxy is configured
        id: check_proxy
        run: |
          if [ -n "${{ secrets.H2PLAY_PROXY_NODE }}" ]; then
            echo "use_proxy=true" >> $GITHUB_OUTPUT
          else
            echo "use_proxy=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Proxy
        if: steps.check_proxy.outputs.use_proxy == 'true'
        run: |
          wget https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          mv gost-linux-amd64-2.11.5 gost
          echo "启动 Gost 转发隧道..."
          nohup ./gost -L http://:8080 -F ${{ secrets.H2PLAY_PROXY_NODE }} > gost.log 2>&1 &
          sleep 3
          echo "测试本地代理连通性..."
          curl -x http://127.0.0.1:8080 https://api.ipify.org -v || echo "代理测试失败，将尝试直连"

      - name: Run Renewal Script
        env:
          H2PLAY_RENEW_URLS: ${{ secrets.H2PLAY_RENEW_URLS }}
          H2PLAY_PROXY_NODE: ${{ secrets.H2PLAY_PROXY_NODE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node renew.js

      - name: Upload Screenshots and Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: |
            screenshots/*.png
            gost.log
          retention-days: 7
