name: Host2Play Auto Renew 

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup environment
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          sudo -E apt-get update -qq
          sudo -E apt-get install -y -qq -o Dpkg::Use-Pty=0 p7zip-full 2>&1 | tail -5

      - name: Download Buster Extension
        run: |
          mkdir -p extensions/buster
          wget -qO extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip
          mkdir -p extensions/buster/unpacked
          7z x -y extensions/buster/buster.zip -oextensions/buster/unpacked > /dev/null

      - name: Download Scripts from Private Repository
        run: |
          curl -H "Authorization: token ${{ secrets.REPO_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -o renew.js \
               -L https://api.github.com/repos/akina005/scripts/contents/scripts/host2play/renew.js
          curl -H "Authorization: token ${{ secrets.REPO_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -o package.json \
               -L https://api.github.com/repos/akina005/scripts/contents/scripts/host2play/package.json

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Check if proxy is configured
        id: check_proxy
        run: |
          if [ -n "${{ secrets.H2PLAY_PROXY_NODE }}" ]; then
            echo "use_proxy=true" >> $GITHUB_OUTPUT
          else
            echo "use_proxy=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Xray
        if: steps.check_proxy.outputs.use_proxy == 'true'
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          mkdir -p xray-bin
          unzip -oq Xray-linux-64.zip -d xray-bin
          chmod +x xray-bin/xray
          sudo mv xray-bin/xray /usr/local/bin/xray

      - name: Build Xray config
        if: steps.check_proxy.outputs.use_proxy == 'true'
        env:
          PROXY_URL: ${{ secrets.H2PLAY_PROXY_NODE }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          from urllib.parse import parse_qs, unquote, urlparse

          proxy_url = os.environ["PROXY_URL"]
          parsed = urlparse(proxy_url)
          scheme = parsed.scheme

          if scheme not in {"vless", "vmess"}:
              raise SystemExit(f"Unsupported proxy scheme: {scheme}")

          def build_stream_settings(query, host):
              transport_type = query.get("type", "tcp")
              if transport_type == "h2":
                  transport_type = "http"

              stream_settings = {
                  "network": transport_type,
                  "security": query.get("security", "none"),
              }

              if stream_settings["security"] == "reality":
                  reality = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                      "publicKey": query.get("pbk", ""),
                  }
                  if query.get("sid"):
                      reality["shortId"] = query["sid"]
                  if query.get("spx"):
                      reality["spiderX"] = query["spx"]
                  stream_settings["realitySettings"] = reality
              elif stream_settings["security"] == "tls":
                  stream_settings["tlsSettings"] = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                  }

              if transport_type == "tcp":
                  header_type = query.get("headerType", "none")
                  stream_settings["tcpSettings"] = {
                      "header": {"type": header_type}
                  }
              elif transport_type == "ws":
                  headers = {}
                  if query.get("host"):
                      headers["Host"] = query["host"]
                  stream_settings["wsSettings"] = {
                      "path": query.get("path", "/"),
                      "headers": headers,
                  }
              elif transport_type == "http":
                  host_list = [h for h in query.get("host", "").split(",") if h]
                  stream_settings["httpSettings"] = {
                      "host": host_list,
                      "path": query.get("path", "/"),
                  }
              elif transport_type == "grpc":
                  stream_settings["grpcSettings"] = {
                      "serviceName": query.get("serviceName", ""),
                      "authority": query.get("authority", ""),
                  }

              return stream_settings

          if scheme == "vless":
              qs = {k: v[-1] for k, v in parse_qs(parsed.query).items()}
              host = parsed.hostname
              port = parsed.port
              user_id = unquote(parsed.username or "")

              if not host or not port or not user_id:
                  raise SystemExit("Invalid VLESS URL: missing host, port, or uuid")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "encryption": qs.get("encryption", "none"),
                              "flow": qs.get("flow", ""),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(qs, host),
              }
          else:
              payload = parsed.netloc + parsed.path
              padded = payload + "=" * (-len(payload) % 4)
              vmess = json.loads(base64.urlsafe_b64decode(padded).decode("utf-8"))
              host = vmess.get("add")
              port = int(vmess.get("port", 0))
              user_id = vmess.get("id", "")
              if not host or not port or not user_id:
                  raise SystemExit("Invalid VMess URL: missing host, port, or uuid")

              query = {
                  "type": vmess.get("net", "tcp"),
                  "security": vmess.get("tls", "none"),
                  "path": vmess.get("path", "/") or "/",
                  "host": vmess.get("host", ""),
                  "sni": vmess.get("sni", "") or host,
                  "fp": vmess.get("fp", "chrome"),
                  "serviceName": vmess.get("path", ""),
                  "authority": vmess.get("host", ""),
                  "headerType": vmess.get("type", "none") or "none",
              }

              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "alterId": int(vmess.get("aid", 0) or 0),
                              "security": vmess.get("scy", "auto"),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(query, host),
              }

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{
                  "listen": "127.0.0.1",
                  "port": 8080,
                  "protocol": "http",
              }],
              "outbounds": [outbound],
          }

          with open("xray-config.json", "w", encoding="ascii") as f:
              json.dump(config, f, indent=2)
          PY

      - name: Start Xray proxy
        if: steps.check_proxy.outputs.use_proxy == 'true'
        run: |
          nohup xray run -c xray-config.json > xray.log 2>&1 &
          sleep 2
          xray version
          sed -n '1,20p' xray.log || true

      - name: Check IP
        if: steps.check_proxy.outputs.use_proxy == 'true'
        run: |
          curl -s --proxy http://127.0.0.1:8080 https://api.ipify.org && echo
          curl -s --proxy http://127.0.0.1:8080 https://ipinfo.io

      - name: Run Renewal Script
        env:
          H2PLAY_RENEW_URLS: ${{ secrets.H2PLAY_RENEW_URLS }}
          H2PLAY_PROXY_NODE: ${{ secrets.H2PLAY_PROXY_NODE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node renew.js

      - name: Upload Screenshots and Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: |
            screenshots/*.png
            xray.log
          retention-days: 7

      - name: Cleanup old workflow runs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_NAME: Host2Play Auto Renew
        run: |
          python - <<'PY'
          import json, os, subprocess
          repo = os.environ["REPO"]
          name = os.environ["WORKFLOW_NAME"]
          r = subprocess.run(["gh","api",f"repos/{repo}/actions/runs","--paginate"], capture_output=True, text=True, check=True)
          runs = json.loads(r.stdout).get("workflow_runs", [])
          target = sorted([x for x in runs if x.get("name") == name], key=lambda x: x.get("created_at",""), reverse=True)
          for run in target[5:]:
              rid = str(run["id"])
              print(f"Deleting run {rid}")
              subprocess.run(["gh","api","-X","DELETE",f"repos/{repo}/actions/runs/{rid}"], check=True)
          PY
