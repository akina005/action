name: Host2Play Auto Renew

on:
  workflow_dispatch:
  schedule:
    # 每天 0:30 / 8:30 UTC 运行
    - cron: "30 0,8 * * *"

permissions:
  contents: read

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          mkdir -p runtime
          pushd runtime
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full
          popd

      - name: Install Xray
        run: |
          mkdir -p runtime
          pushd runtime
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          mkdir -p xray-bin
          unzip -oq Xray-linux-64.zip -d xray-bin
          chmod +x xray-bin/xray
          sudo mv xray-bin/xray /usr/local/bin/xray
          xray version
          popd

      - name: Build Xray config
        env:
          PROXY_URL: ${{ secrets.h2play_PROXY_NODE }}
        run: |
          mkdir -p runtime
          pushd runtime
          python - <<'PY'
          import base64
          import json
          import os
          from urllib.parse import parse_qs, unquote, urlparse

          proxy_url = os.environ["PROXY_URL"]
          parsed = urlparse(proxy_url)
          scheme = parsed.scheme

          if scheme not in {"vless", "vmess"}:
              raise SystemExit(f"Unsupported proxy scheme: {scheme}")

          def build_stream_settings(query, host):
              transport_type = query.get("type", "tcp")
              if transport_type == "h2":
                  transport_type = "http"

              stream_settings = {
                  "network": transport_type,
                  "security": query.get("security", "none"),
              }

              if stream_settings["security"] == "reality":
                  reality = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                      "publicKey": query.get("pbk", ""),
                  }
                  if query.get("sid"):
                      reality["shortId"] = query["sid"]
                  if query.get("spx"):
                      reality["spiderX"] = query["spx"]
                  stream_settings["realitySettings"] = reality
              elif stream_settings["security"] == "tls":
                  tls_settings = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                      "allowInsecure": query.get("allowInsecure") in {"1", "true", "True"} or query.get("insecure") in {"1", "true", "True"},
                  }
                  stream_settings["tlsSettings"] = tls_settings

              if transport_type == "tcp":
                  header_type = query.get("headerType", "none")
                  stream_settings["tcpSettings"] = {
                      "header": {"type": header_type}
                  }
              elif transport_type == "ws":
                  headers = {}
                  if query.get("host"):
                      headers["Host"] = query["host"]
                  stream_settings["wsSettings"] = {
                      "path": query.get("path", "/"),
                      "headers": headers,
                  }
              elif transport_type == "http":
                  host_list = [h for h in query.get("host", "").split(",") if h]
                  stream_settings["httpSettings"] = {
                      "host": host_list,
                      "path": query.get("path", "/"),
                  }
              elif transport_type == "grpc":
                  stream_settings["grpcSettings"] = {
                      "serviceName": query.get("serviceName", ""),
                      "authority": query.get("authority", ""),
                  }

              return stream_settings

          if scheme == "vless":
              qs = {k: v[-1] for k, v in parse_qs(parsed.query).items()}
              host = parsed.hostname
              port = parsed.port
              user_id = unquote(parsed.username or "")

              if not host or not port or not user_id:
                  raise SystemExit("Invalid VLESS URL: missing host, port, or uuid")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "encryption": qs.get("encryption", "none"),
                              "flow": qs.get("flow", ""),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(qs, host),
              }
          else:
              payload = parsed.netloc + parsed.path
              padded = payload + "=" * (-len(payload) % 4)
              vmess = json.loads(base64.urlsafe_b64decode(padded).decode("utf-8"))
              host = vmess.get("add")
              port = int(vmess.get("port", 0))
              user_id = vmess.get("id", "")
              if not host or not port or not user_id:
                  raise SystemExit("Invalid VMess URL: missing host, port, or uuid")

              query = {
                  "type": vmess.get("net", "tcp"),
                  "security": vmess.get("tls", "none"),
                  "path": vmess.get("path", "/") or "/",
                  "host": vmess.get("host", ""),
                  "sni": vmess.get("sni", "") or host,
                  "fp": vmess.get("fp", "chrome"),
                  "serviceName": vmess.get("path", ""),
                  "authority": vmess.get("host", ""),
                  "headerType": vmess.get("type", "none") or "none",
                  "allowInsecure": str(vmess.get("allowInsecure", "")).lower(),
                  "insecure": str(vmess.get("insecure", "")).lower(),
              }

              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "alterId": int(vmess.get("aid", 0) or 0),
                              "security": vmess.get("scy", "auto"),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(query, host),
              }

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{
                  "listen": "127.0.0.1",
                  "port": 8080,
                  "protocol": "http",
              }],
              "outbounds": [outbound],
          }

          with open("xray-config.json", "w", encoding="ascii") as f:
              json.dump(config, f, indent=2)
          PY
          popd

      - name: Start Xray proxy
        run: |
          mkdir -p runtime
          pushd runtime
          nohup xray run -c xray-config.json > xray.log 2>&1 &
          sleep 2
          xray version
          powershell -NoProfile -Command "Get-Content -Path xray.log -TotalCount 20" 2>/dev/null || sed -n '1,20p' xray.log || true
          popd

      - name: Install Node dependencies
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ -z "$REPO_TOKEN" ]; then
            echo "[错误] 未配置 REPO_TOKEN，无法拉取私库 package.json。"
            exit 1
          fi

          mkdir -p runtime
          pushd runtime
          curl -fsSL \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -H "Accept: application/vnd.github.raw+json" \
            https://api.github.com/repos/akina005/scripts/contents/scripts/host2play/package.json \
            -o package.json
          npm install
          npx playwright install --with-deps chromium
          popd

      - name: Download NopeCHA extension
        run: |
          mkdir -p runtime
          pushd runtime
          mkdir -p extensions/nopecha
          wget -O extensions/nopecha/chromium.zip https://github.com/NopeCHALLC/nopecha-extension/releases/latest/download/chromium.zip
          popd
      
      - name: Unpack NopeCHA extension
        run: |
          mkdir -p runtime
          pushd runtime
          mkdir -p extensions/nopecha/unpacked
          7z x -y extensions/nopecha/chromium.zip -oextensions/nopecha/unpacked
          popd

      - name: Run renew script
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          h2play_ACCOUNTS: ${{ secrets.h2play_ACCOUNTS }}
          h2play_RENEW_URLS: ${{ secrets.h2play_RENEW_URLS }}
          BYPASS_PROXY: http://127.0.0.1:8080
        run: |
          if [ -z "$REPO_TOKEN" ]; then
            echo "[错误] 未配置 REPO_TOKEN，无法拉取私库脚本。"
            exit 1
          fi

          mkdir -p runtime
          pushd runtime
          mkdir -p screenshots
          curl -fsSL \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -H "Accept: application/vnd.github.raw+json" \
            https://api.github.com/repos/akina005/scripts/contents/scripts/host2play/renew.js \
            -o renew.remote.js
          curl -s --proxy http://127.0.0.1:8080 https://api.ipify.org && echo
          xvfb-run -a node renew.remote.js
          popd

      # =========================
      # 🚀 发送 Telegram 截图通知
      # =========================
      - name: Send Telegram Notification
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "[TG通知] 未配置 Telegram 变量，跳过通知。"
            exit 0
          fi

          if [ ! -d runtime ]; then
            echo "[错误] 未找到 runtime 目录，跳过通知。"
            exit 0
          fi

          pushd runtime
          shopt -s nullglob # 防止匹配不到文件时报错

          # 遍历所有成功的截图
          for img in screenshots/4_final_result_*.png; do
            task_num=$(echo "$img" | grep -o '[0-9]\+\.png$' | grep -o '[0-9]\+')
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendPhoto" \
              -F "chat_id=${TG_CHAT_ID}" \
              -F "photo=@$img" \
              -F "caption=✅ 机器 [${task_num}] 续期流程执行完毕！请看图确认是否成功。"
            echo "[TG通知] 发送成功截图: $img"
            sleep 1 # 稍微停顿一下，防止被 TG 限制发送频率
          done
          
          # 遍历所有崩溃的截图
          for img in screenshots/error_crash_*.png; do
            task_num=$(echo "$img" | grep -o '[0-9]\+\.png$' | grep -o '[0-9]\+')
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendPhoto" \
              -F "chat_id=${TG_CHAT_ID}" \
              -F "photo=@$img" \
              -F "caption=❌ 机器 [${task_num}] 续期发生崩溃！请检查截图报错。"
            echo "[TG通知] 发送崩溃截图: $img"
            sleep 1
          done
          popd
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: runtime/screenshots/**
          if-no-files-found: warn
          compression-level: 6
