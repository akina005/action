name: Host2Play Auto Renew 

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download Buster Extension
        run: |
          mkdir -p extensions
          cd extensions
          wget https://github.com/dessant/buster/releases/download/v2.0.1/buster-2.0.1-chromium.zip
          unzip buster-2.0.1-chromium.zip -d buster
          rm buster-2.0.1-chromium.zip

      - name: Download Scripts from Private Repository
        run: |
          curl -H "Authorization: token ${{ secrets.REPO_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -o renew.js \
               -L https://api.github.com/repos/akina005/scripts/contents/scripts/host2play/renew.js
          curl -H "Authorization: token ${{ secrets.REPO_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -o package.json \
               -L https://api.github.com/repos/akina005/scripts/contents/scripts/host2play/package.json

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Setup Proxy (if configured)
        if: ${{ secrets.H2PLAY_PROXY_NODE != '' }}
        run: |
          wget https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          mv gost-linux-amd64-2.11.5 gost
          echo "启动 Gost 转发隧道..."
          nohup ./gost -L http://:8080 -F ${{ secrets.H2PLAY_PROXY_NODE }} > gost.log 2>&1 &
          sleep 3
          echo "测试本地代理连通性..."
          curl -x http://127.0.0.1:8080 https://api.ipify.org -v || echo "代理测试失败，将尝试直连"

      - name: Run Renewal Script
        env:
          H2PLAY_RENEW_URLS: ${{ secrets.H2PLAY_RENEW_URLS }}
          H2PLAY_PROXY_NODE: ${{ secrets.H2PLAY_PROXY_NODE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: node renew.js

      - name: Upload Screenshots and Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: |
            screenshots/*.png
            gost.log
          retention-days: 7
