name: Teohe Bypass Only

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Xray
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          mkdir -p xray-bin
          unzip -oq Xray-linux-64.zip -d xray-bin
          chmod +x xray-bin/xray
          sudo mv xray-bin/xray /usr/local/bin/xray

      - name: Build Xray config
        env:
          PROXY_URL: ${{ secrets.teohe_ROXY_NODE }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          from urllib.parse import parse_qs, unquote, urlparse

          proxy_url = os.environ["PROXY_URL"]
          parsed = urlparse(proxy_url)
          scheme = parsed.scheme

          if scheme not in {"vless", "vmess"}:
              raise SystemExit(f"Unsupported proxy scheme: {scheme}")

          def build_stream_settings(query, host):
              transport_type = query.get("type", "tcp")
              if transport_type == "h2":
                  transport_type = "http"

              stream_settings = {
                  "network": transport_type,
                  "security": query.get("security", "none"),
              }

              if stream_settings["security"] == "reality":
                  reality = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                      "publicKey": query.get("pbk", ""),
                  }
                  if query.get("sid"):
                      reality["shortId"] = query["sid"]
                  if query.get("spx"):
                      reality["spiderX"] = query["spx"]
                  stream_settings["realitySettings"] = reality
              elif stream_settings["security"] == "tls":
                  stream_settings["tlsSettings"] = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                  }

              if transport_type == "tcp":
                  header_type = query.get("headerType", "none")
                  stream_settings["tcpSettings"] = {
                      "header": {"type": header_type}
                  }
              elif transport_type == "ws":
                  headers = {}
                  if query.get("host"):
                      headers["Host"] = query["host"]
                  stream_settings["wsSettings"] = {
                      "path": query.get("path", "/"),
                      "headers": headers,
                  }
              elif transport_type == "http":
                  host_list = [h for h in query.get("host", "").split(",") if h]
                  stream_settings["httpSettings"] = {
                      "host": host_list,
                      "path": query.get("path", "/"),
                  }
              elif transport_type == "grpc":
                  stream_settings["grpcSettings"] = {
                      "serviceName": query.get("serviceName", ""),
                      "authority": query.get("authority", ""),
                  }

              return stream_settings

          if scheme == "vless":
              qs = {k: v[-1] for k, v in parse_qs(parsed.query).items()}
              host = parsed.hostname
              port = parsed.port
              user_id = unquote(parsed.username or "")

              if not host or not port or not user_id:
                  raise SystemExit("Invalid VLESS URL: missing host, port, or uuid")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "encryption": qs.get("encryption", "none"),
                              "flow": qs.get("flow", ""),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(qs, host),
              }
          else:
              payload = parsed.netloc + parsed.path
              padded = payload + "=" * (-len(payload) % 4)
              vmess = json.loads(base64.urlsafe_b64decode(padded).decode("utf-8"))
              host = vmess.get("add")
              port = int(vmess.get("port", 0))
              user_id = vmess.get("id", "")
              if not host or not port or not user_id:
                  raise SystemExit("Invalid VMess URL: missing host, port, or uuid")

              query = {
                  "type": vmess.get("net", "tcp"),
                  "security": vmess.get("tls", "none"),
                  "path": vmess.get("path", "/") or "/",
                  "host": vmess.get("host", ""),
                  "sni": vmess.get("sni", "") or host,
                  "fp": vmess.get("fp", "chrome"),
                  "serviceName": vmess.get("path", ""),
                  "authority": vmess.get("host", ""),
                  "headerType": vmess.get("type", "none") or "none",
              }

              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "alterId": int(vmess.get("aid", 0) or 0),
                              "security": vmess.get("scy", "auto"),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(query, host),
              }

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{
                  "listen": "127.0.0.1",
                  "port": 8080,
                  "protocol": "http",
              }],
              "outbounds": [outbound],
          }

          with open("xray-config.json", "w", encoding="ascii") as f:
              json.dump(config, f, indent=2)
          PY

      - name: Start Xray proxy
        run: |
          nohup xray run -c xray-config.json > xray.log 2>&1 &
          sleep 2
          xray version
          sed -n '1,160p' xray.log || true
          echo "xray started"

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full pulseaudio alsa-utils ffmpeg
          pulseaudio --start --exit-idle-time=-1 || true
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Download Turnstile Bypasser
        run: |
          mkdir -p extensions/turnstile-bypasser
          curl -L "https://clients2.google.com/service/update2/crx?response=redirect&prodversion=131.0.0.0&acceptformat=crx2,crx3&x=id%3Ddockglonapofdibnccbnendkgdmhdplk%26installsource%3Dondemand%26uc" --create-dirs -o extensions/turnstile-bypasser/turnstile.crx

      - name: Unzip Turnstile Bypasser
        run: |
          mkdir -p extensions/turnstile-bypasser/unpacked
          7z x -y extensions/turnstile-bypasser/turnstile.crx -oextensions/turnstile-bypasser/unpacked

      - name: Fetch private bypass script
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          curl -L \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            -o bypass_js.js \
            "https://api.github.com/repos/akina005/scripts/contents/scripts/teohe/bypass_js.js?ref=main"

      - name: Check IP
        run: |
          echo "🌍 当前代理出口 IP:"
          curl -s --proxy http://127.0.0.1:8080 https://api.ipify.org
          echo
          curl -s --proxy http://127.0.0.1:8080 https://ipinfo.io

      - name: Run bypass JS script
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          BYPASS_PROXY: http://127.0.0.1:8080
        run: |
          mkdir -p screenshots
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node bypass_js.js "https://linkvertise.com/1235005/662/dynamic?r=aHR0cHM6Ly9tYW5hZ2VyLnRlb2hlYmVyZy5mci9saW5rdmVydGlzZS92ZXJpZnkvbExQZHg4dnZpRW5WWUN3SzFqakM%3D&o=sharing"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: screenshots/*
          retention-days: 1
