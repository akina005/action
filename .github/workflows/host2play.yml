name: Host2Play Auto Renew

on:
  schedule:
    - cron: '0 0,11,22 * * *'    # 触发点: 00:00, 11:00, 22:00
    - cron: '30 5,16 * * *'      # 触发点: 05:30, 16:30
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg unzip

      - name: 启用 WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 配置 DNS 并验证 WARP
        run: |
          set -euo pipefail
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 3

          for i in {1..30}; do
            status=$(curl -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace | grep -oP 'warp=\K\w+' || echo unknown)
            [[ "$status" =~ ^(on|plus)$ ]] && echo "WARP 已连接" && break
            echo "WARP 连接中... ($i/30)"
            sleep 2
          done
          echo -n "出口 IP: " && curl -s https://api.ipify.org && echo

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests SpeechRecognition pydub
          python -m playwright install --with-deps chromium

      - name: 拉取私库脚本
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -H "Accept: application/vnd.github.raw+json" \
            "https://api.github.com/repos/akina005/scripts/contents/scripts/host2play/main.py" \
            -o remote_main.py

          test -s remote_main.py

      - name: Run Renew Script
        env:
          H2PLAY_RENEW_URLS: ${{ secrets.H2PLAY_RENEW_URLS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python remote_main.py

      - name: 清理旧工作流记录
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = 'host2play.yml';
            const keep = 5;

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              { owner, repo, workflow_id, per_page: 100 }
            );

            const oldRuns = runs.slice(keep);
            core.info(`Found ${runs.length} runs, deleting ${oldRuns.length} old runs.`);

            for (const run of oldRuns) {
              await github.rest.actions.deleteWorkflowRun({
                owner,
                repo,
                run_id: run.id,
              });
              core.info(`Deleted workflow run ${run.id}`);
            }
