name: Teohe Auto Renew (warp)

on:
  workflow_dispatch:

  push:
    paths:
      - "teohe-warp/warp.js"
      - "teohe-warp/Teohe_warp.yml"

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup environment
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          set -euo pipefail
          APP_DIR="teohe-warp"
          mkdir -p "$APP_DIR"

          sudo -E apt-get update -qq
          sudo -E apt-get install -y -qq -o Dpkg::Use-Pty=0 xvfb p7zip-full ffmpeg python3 python3-pip 2>&1 | tail -5
          cd "$APP_DIR"
          npm init -y --silent
          npm install --silent playwright
          python3 -m pip install --quiet SpeechRecognition pydub
           npx playwright install --with-deps chromium 2>&1 | tail -5
           # Turnstile bypasser extension
           mkdir -p extensions/turnstile-bypasser/unpacked
           curl -fsSL "https://github.com/oyz6/action/releases/download/Verification/turnstile.crx" -o extensions/turnstile-bypasser/turnstile.crx
           7z x -y extensions/turnstile-bypasser/turnstile.crx -oextensions/turnstile-bypasser/unpacked > /dev/null

      - name: 启用 WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 配置 DNS 并验证 WARP
        run: |
          set -euo pipefail
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 3

          for i in {1..30}; do
            status=$(curl -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace | grep -oP 'warp=\K\w+' || echo unknown)
            if [[ "$status" =~ ^(on|plus)$ ]]; then
              echo "WARP 已连接"
              break
            fi
            echo "WARP 连接中... ($i/30)"
            sleep 2
          done
          echo -n "出口 IP: " && curl -s --max-time 15 https://api.ipify.org && echo

      - name: Check IP
        run: |
          curl -s https://api.ipify.org && echo
          curl -s https://ipinfo.io

      - name: Fetch private login script
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -euo pipefail
          APP_DIR="teohe-warp"
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"
          curl -fsSL \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            -o warp.js \
            "https://api.github.com/repos/akina005/scripts/contents/scripts/teohe/warp.js?ref=main"

      - name: Run full flow
        env:
          TEOHE_ACCOUNTS: ${{ secrets.TEOHE_ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set -euo pipefail
          APP_DIR="teohe-warp"
          cd "$APP_DIR"
          mkdir -p screenshots
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node warp.js

      - name: Cleanup old runs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_FILE: Teohe_warp.yml
        run: |
          python - <<'PY'
          import json, os, subprocess
          repo = os.environ["REPO"]
          workflow_file = os.environ["WORKFLOW_FILE"]
          r = subprocess.run([
              "gh", "api", f"repos/{repo}/actions/workflows/{workflow_file}/runs", "--paginate"
          ], capture_output=True, text=True, check=True)
          runs = json.loads(r.stdout).get("workflow_runs", [])
          target = sorted(runs, key=lambda x: x.get("created_at", ""), reverse=True)
          for run in target[3:]:
              rid = str(run["id"])
              print(f"Deleting {rid}")
              subprocess.run(["gh","api","-X","DELETE",f"repos/{repo}/actions/runs/{rid}"], check=True)
          PY
