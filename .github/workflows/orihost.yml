name: OriHost 续期

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 1 *'   # 自动更新下次运行时间

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --quiet playwright
          python -m playwright install chromium

      - name: 安装并启动代理
        env:
          Ori_PROXY_NODE: ${{ secrets.Ori_PROXY_NODE }}
        run: |
          if [ -z "$Ori_PROXY_NODE" ]; then
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi

          wget -q https://github.com/oyz6/action/releases/download/proxy/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray && chmod +x xray/xray

          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("Ori_PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] Ori_PROXY_NODE 为空")
              sys.exit(1)

          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("trojan://"):
              protocol = "trojan"
              content = url[9:]
          elif url.startswith("ss://"):
              protocol = "ss"
              content = url[5:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              protocol = "socks5"
              content = url.split("://")[1].split("#")[0]
              if "@" in content:
                  server = content.split("@")[1].split(":")[0]
              else:
                  server = content.split(":")[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w", encoding="utf-8") as f:
                  f.write(url.split("#")[0])
              sys.exit(0)
          else:
              print(f"[ERROR] 不支持的协议: {url.split('://')[0]}")
              sys.exit(1)

          if "#" in content:
              content = content.rsplit("#", 1)[0]

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 1080, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 1081, "listen": "127.0.0.1", "protocol": "http"}
              ],
              "outbounds": []
          }

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""
              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"
              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              outbound = {
                  "protocol": "vless",
                  "settings": {"vnext": [{"address": address, "port": int(port), "users": [{"id": uuid, "encryption": "none"}]}]},
                  "streamSettings": {"network": network, "security": security}
              }
              if flow:
                  outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow
              if security == "reality":
                  outbound["streamSettings"]["realitySettings"] = {"serverName": sni, "fingerprint": fp, "publicKey": pbk}
              elif security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {"serverName": sni, "fingerprint": fp, "allowInsecure": False}
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": path, "headers": {"Host": host}}
              elif network == "grpc":
                  outbound["streamSettings"]["grpcSettings"] = {"serviceName": params.get("serviceName", [""])[0]}
              config["outbounds"].append(outbound)
          elif protocol == "vmess":
              try:
                  padding = 4 - len(content) % 4
                  if padding != 4:
                      content += "=" * padding
                  vm = json.loads(base64.b64decode(content).decode("utf-8"))
              except Exception as e:
                  print(f"[ERROR] VMess 解析失败: {e}")
                  sys.exit(1)
              address = vm.get("add", "")
              port = int(vm.get("port", 443))
              uuid = vm.get("id", "")
              aid = int(vm.get("aid", 0))
              network = vm.get("net", "tcp")
              tls = vm.get("tls", "")
              sni = vm.get("sni", "") or vm.get("host", address)
              host = vm.get("host", address)
              path = vm.get("path", "/")
              fp = vm.get("fp", "chrome")
              outbound = {
                  "protocol": "vmess",
                  "settings": {"vnext": [{"address": address, "port": port, "users": [{"id": uuid, "alterId": aid, "security": "auto"}]}]},
                  "streamSettings": {"network": network, "security": "tls" if tls == "tls" else "none"}
              }
              if tls == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {"serverName": sni, "fingerprint": fp, "allowInsecure": False}
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": path, "headers": {"Host": host}}
              config["outbounds"].append(outbound)
          elif protocol == "trojan":
              password, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""
              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"
              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              network = params.get("type", ["tcp"])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              fp = params.get("fp", ["chrome"])[0]
              outbound = {
                  "protocol": "trojan",
                  "settings": {"servers": [{"address": address, "port": int(port), "password": password}]},
                  "streamSettings": {"network": network, "security": "tls", "tlsSettings": {"serverName": sni, "fingerprint": fp, "allowInsecure": False}}
              }
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": path, "headers": {"Host": host}}
              config["outbounds"].append(outbound)
          elif protocol == "ss":
              try:
                  if "@" in content:
                      encoded, server_part = content.split("@", 1)
                      decoded = base64.b64decode(encoded + "==").decode("utf-8")
                      method, password = decoded.split(":", 1)
                      address, port = server_part.split(":", 1)
                  else:
                      decoded = base64.b64decode(content + "==").decode("utf-8")
                      if "@" in decoded:
                          user_part, server_part = decoded.split("@", 1)
                          method, password = user_part.split(":", 1)
                          address, port = server_part.split(":", 1)
                      else:
                          raise ValueError("无法解析")
              except Exception as e:
                  print(f"[ERROR] Shadowsocks 解析失败: {e}")
                  sys.exit(1)
              config["outbounds"].append({"protocol": "shadowsocks", "settings": {"servers": [{"address": address, "port": int(port), "method": method, "password": password}]}})

          with open("xray_config.json", "w", encoding="utf-8") as f:
              json.dump(config, f, indent=2)
          print("[INFO] ✅ 代理配置已生成")
          PYEOF

          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SERVER=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5
          for i in 1 2 3 4 5; do
            if curl -x socks5://127.0.0.1:1080 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV
              exit 0
            fi
            sleep 3
          done
          cat xray.log
          exit 1

      - name: 恢复登录态缓存
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: scripts/orihost/storage_state.json
          key: orihost-state-${{ github.run_id }}
          restore-keys: |
            orihost-state-

      - name: 检查出口 IP
        run: |
          echo "[IP检查] 直连出口 IP:"
          curl -s --max-time 20 https://api.ipify.org && echo
          echo ""
          if [ -n "$PROXY_SERVER" ]; then
            echo "[IP检查] 当前代理: $PROXY_SERVER"
            echo "[IP检查] 代理出口 IP:"
            curl -s --max-time 20 --proxy "$PROXY_SERVER" https://api.ipify.org && echo
            echo "[IP检查] 代理出口详情:"
            curl -s --max-time 20 --proxy "$PROXY_SERVER" https://ipinfo.io && echo
          else
            echo "[IP检查] 当前未启用代理，脚本将直连访问目标站。"
          fi

      - name: 运行续期脚本
        id: run_renew
        env:
          Ori: ${{ secrets.Ori }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          Ori_PROXY_NODE: ${{ env.PROXY_SERVER }}
        run: |
          python3 scripts/orihost/main.py 2>&1 | tee renew.log

      - name: 删除旧浏览器状态缓存
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREFIX="orihost-state-"
          CACHE_KEYS=$(gh cache list --limit 100 --json key -q '.[].key' --repo ${{ github.repository }} | grep "^${PREFIX}" || true)
          if [ -n "$CACHE_KEYS" ]; then
            echo "$CACHE_KEYS" | while read -r key; do
              [ -n "$key" ] && gh cache delete "$key" --repo ${{ github.repository }} || true
            done
          fi

      - name: 保存登录态缓存
        if: success()
        uses: actions/cache/save@v4
        with:
          path: scripts/orihost/storage_state.json
          key: orihost-state-${{ github.run_id }}

      - name: 提取到期时间
        id: extract_due
        if: success()
        run: |
          RENEWAL_DAYS=$(grep -oP '续期后时间\(天\): \K\d+(?:\.\d+)?' renew.log | tail -1 || echo "")
          if [ -n "$RENEWAL_DAYS" ]; then
            echo "renewal_days=$RENEWAL_DAYS" >> $GITHUB_OUTPUT
            echo "skip_update=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          DUE_DATE=$(grep -oP '到期时间\(标准\): \K\d{4}-\d{2}-\d{2}' renew.log | tail -1 || echo "")
          if [ -z "$DUE_DATE" ]; then
            echo "skip_update=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "due_date=$DUE_DATE" >> $GITHUB_OUTPUT
          echo "skip_update=false" >> $GITHUB_OUTPUT

      - name: 修改下次 Cron 时间
        if: success() && steps.extract_due.outputs.skip_update != 'true'
        run: |
          set -e
          RENEWAL_DAYS="${{ steps.extract_due.outputs.renewal_days }}"
          if [ -n "$RENEWAL_DAYS" ]; then
            HOURS_UNTIL_NEXT_RUN=$(python3 -c "value=float('$RENEWAL_DAYS'); print(max(int((value - 2) * 24), 4))")
          else
            DUE_DATE="${{ steps.extract_due.outputs.due_date }}"
            CURRENT_EPOCH=$(date -u +%s)
            DUE_EPOCH=$(date -u -d "$DUE_DATE 00:00:00" +%s)
            REMAINING_HOURS_INT=$(((DUE_EPOCH - CURRENT_EPOCH) / 3600))
            if [ "$REMAINING_HOURS_INT" -gt 48 ]; then
              HOURS_UNTIL_NEXT_RUN=$((REMAINING_HOURS_INT - 48))
            else
              HOURS_UNTIL_NEXT_RUN=4
            fi
          fi
          NEXT_DATE=$(date -u -d "+${HOURS_UNTIL_NEXT_RUN} hours" +"%Y-%m-%d %H:%M")
          NEXT_MINUTE=$(date -u -d "+${HOURS_UNTIL_NEXT_RUN} hours" +"%-M")
          NEXT_HOUR=$(date -u -d "+${HOURS_UNTIL_NEXT_RUN} hours" +"%-H")
          NEXT_DAY=$(date -u -d "+${HOURS_UNTIL_NEXT_RUN} hours" +"%-d")
          NEXT_MONTH=$(date -u -d "+${HOURS_UNTIL_NEXT_RUN} hours" +"%-m")
          NEW_CRON="$NEXT_MINUTE $NEXT_HOUR $NEXT_DAY $NEXT_MONTH *"

          git clone https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/${{ github.repository }}.git workflow_repo
          cd workflow_repo
          WORKFLOW_FILE=".github/workflows/orihost.yml"
          LINE_NUM=$(grep -n "cron: '" "$WORKFLOW_FILE" | head -n1 | cut -d: -f1)
          if [ -z "$LINE_NUM" ]; then
            exit 1
          fi
          sed -i "${LINE_NUM}c\\    - cron: '$NEW_CRON'   # 自动更新下次运行时间" "$WORKFLOW_FILE"
          if git diff --quiet "$WORKFLOW_FILE"; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$WORKFLOW_FILE"
          git commit -m "🔄 自动更新 OriHost 续期 Cron" \
                     -m "下次运行: $NEXT_DATE UTC" \
                     -m "Cron: $NEW_CRON"
          git push

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: orihost.yml
          retain_days: 0
          keep_minimum_runs: 5
