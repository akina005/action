name: Dabo Auto Checkin

on:
  schedule:
    # 每天北京时间上午 08:30 自动运行 (UTC 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动点击 "Run workflow" 触发执行

jobs:
  checkin-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 安装中文字体 (解决截图乱码)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei
          # 刷新字体缓存
          sudo fc-cache -fv
          
      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 开启缓存以加快后续运行速度

      - name: 3. 安装必要依赖
        run: |
          pip install seleniumbase requests
          # 安装 undetected-chromedriver 运行所需的浏览器驱动
          sbase install chromedriver

      - name: 4. 执行签到脚本
        env:
          # 从 GitHub Secrets 读取配置
          LX_ACCOUNTS: ${{ secrets.LX_ACCOUNTS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python openlxcloud.py

      - name: 5. 上传运行截图 (可选)
        if: always() # 无论成功失败都上传截图，方便调试
        uses: actions/upload-artifact@v4
        with:
          name: checkin-screenshots
          path: "*.png"
          retention-days: 3
