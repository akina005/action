name: GreatHost Auto Renew

on: 
  schedule:
    - cron: '5 */12 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: 📥 检出私有代码
      uses: actions/checkout@v4
      with:
        repository: 'akina005/scripts'
        token: ${{ secrets.REPO_TOKEN }}

    - name: 🟢 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 💾 Cache Cookies
      uses: actions/cache@v3
      with:
        path: /tmp/greathost_cookies.json
        key: greathost-cookies-${{ github.run_number }}
        restore-keys: |
          greathost-cookies-

    - name: 📦 Install dependencies
      working-directory: scripts/greathost
      run: |
        # 兼容处理：如果有 requirements.txt 就用它，没有就直接装依赖
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          pip install playwright requests
        fi
        playwright install chromium

    - name: 🚀 Run Auto Renew
      working-directory: scripts/greathost
      env:
        GREATHOST_EMAIL: ${{ secrets.GREATHOST_EMAIL }}
        GREATHOST_PASSWORD: ${{ secrets.GREATHOST_PASSWORD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        python greathost.py

    - name: 📸 Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ github.run_number }}
        path: /tmp/*.png
        if-no-files-found: ignore
        retention-days: 3
