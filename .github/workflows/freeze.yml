name: 🎮 FreezeHost 自动续期
on:
  schedule:
    - cron: '0 8 */10 * *'
  workflow_dispatch:
jobs:
  renew:
    name: 🔄 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 👇 替换为拉取私有仓库的逻辑
      - name: 📥 拉取私有代码
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 👇 指定工作目录为 scripts/freeze
      - name: 📦 安装依赖
        working-directory: scripts/freeze
        run: npm install

      # 👇 指定工作目录为 scripts/freeze
      - name: 🌐 安装 Playwright 浏览器
        working-directory: scripts/freeze
        run: npx playwright install chromium --with-deps

      # 👇 修正了 if 判断，使其能正确识别 secrets
      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ secrets.GOST_PROXY != '' }} 
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org

      # 👇 指定工作目录为 scripts/freeze
      - name: 🚀 运行续期脚本
        working-directory: scripts/freeze
        env:
          DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
          DISCORD_TOKEN:   ${{ secrets.DISCORD_TOKEN }}
          TG_BOT:          ${{ secrets.TG_BOT }}
          GOST_PROXY:      http://127.0.0.1:8080
        run: npx playwright test

      # 👇 修正截图上传路径，指向实际运行目录下的 test-results/
      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: scripts/freeze/test-results/
          retention-days: 7
