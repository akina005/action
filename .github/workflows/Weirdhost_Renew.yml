name: Weirdhost 多账号自动续期

on:
  workflow_dispatch:
  schedule:
    - cron: '19 16 22 4 *'   # 自动更新下次运行时间

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4

      - name: 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          ref: main
          token: ${{ secrets.REPO_TOKEN }}
          path: private-scripts
          sparse-checkout: |
            scripts/Weirdhost/Weirdhost_renew.py
          sparse-checkout-cone-mode: false

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-nanum fonts-noto-cjk

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase aiohttp pynacl

      - name: 运行续期脚本
        id: run_renew
        env:
          WEIRDHOST_COOKIE_1: ${{ secrets.WEIRDHOST_COOKIE_1 }}
          WEIRDHOST_COOKIE_2: ${{ secrets.WEIRDHOST_COOKIE_2 }}
          WEIRDHOST_COOKIE_3: ${{ secrets.WEIRDHOST_COOKIE_3 }}
          WEIRDHOST_COOKIE_4: ${{ secrets.WEIRDHOST_COOKIE_4 }}
          WEIRDHOST_COOKIE_5: ${{ secrets.WEIRDHOST_COOKIE_5 }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          GITHUB_REPOSITORY: akina005/action
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python private-scripts/scripts/Weirdhost/Weirdhost_renew.py 2>&1 | tee renew.log

      - name: 提取到期时间
        id: extract_due
        if: success()
        run: |
          python - <<'PYEOF'
          import os
          import re
          from datetime import datetime
          from pathlib import Path

          log_path = Path("renew.log")
          text = log_path.read_text(encoding="utf-8", errors="ignore") if log_path.exists() else ""
          matches = re.findall(r"到期:\s*(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})", text)

          output_path = os.environ["GITHUB_OUTPUT"]
          if not matches:
              with open(output_path, "a", encoding="utf-8") as f:
                  f.write("skip_update=true\n")
              print("::warning::未能提取到期时间，跳过 Cron 更新")
              raise SystemExit(0)

          due_dt = min(datetime.strptime(value, "%Y-%m-%d %H:%M:%S") for value in matches)
          with open(output_path, "a", encoding="utf-8") as f:
              f.write(f"due_datetime={due_dt.strftime('%Y-%m-%d %H:%M:%S')}\n")
              f.write("skip_update=false\n")
          print(f"::notice::📅 当前最早到期时间: {due_dt.strftime('%Y-%m-%d %H:%M:%S')}")
          PYEOF

      - name: 选择通知截图
        id: pick_screenshot
        if: always()
        run: |
          python - <<'PYEOF'
          import os
          from pathlib import Path

          candidates = []
          preferred_suffixes = [
              "_btn_disabled.png",
              "_final.png",
              "_no_btn.png",
              "_popup.png",
              "_error.png",
              "_login_fail.png",
          ]

          for suffix in preferred_suffixes:
              for path in sorted(Path(".").glob(f"*{suffix}"), key=lambda p: p.stat().st_mtime, reverse=True):
                  candidates.append(path)
              if candidates:
                  break

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as f:
              if candidates:
                  f.write(f"screenshot_path={candidates[0].as_posix()}\n")
                  f.write("has_screenshot=true\n")
                  print(f"::notice::🖼 已选择截图: {candidates[0].as_posix()}")
              else:
                  f.write("has_screenshot=false\n")
                  print("::warning::未找到可用于通知的截图")
          PYEOF

      - name: 修改下次 Cron 时间
        id: update_cron
        if: success() && steps.extract_due.outputs.skip_update != 'true'
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -e
          DUE_DATETIME="${{ steps.extract_due.outputs.due_datetime }}"
          echo "📅 当前最早到期时间: $DUE_DATETIME"
          DUE_EPOCH=$(date -u -d "$DUE_DATETIME" +%s)
          CURRENT_EPOCH=$(date -u +%s)
          TARGET_EPOCH=$((DUE_EPOCH - 48 * 3600))

          if [ "$TARGET_EPOCH" -le "$CURRENT_EPOCH" ]; then
            NEXT_EPOCH=$((CURRENT_EPOCH + 4 * 3600))
            echo "::warning::距离到期不足 2 天，改为 4 小时后重试"
          else
            NEXT_EPOCH=$TARGET_EPOCH
          fi

          NEXT_DATE=$(date -u -d "@$NEXT_EPOCH" +"%Y-%m-%d %H:%M")
          NEXT_MINUTE=$(date -u -d "@$NEXT_EPOCH" +"%-M")
          NEXT_HOUR=$(date -u -d "@$NEXT_EPOCH" +"%-H")
          NEXT_DAY=$(date -u -d "@$NEXT_EPOCH" +"%-d")
          NEXT_MONTH=$(date -u -d "@$NEXT_EPOCH" +"%-m")
          NEW_CRON="$NEXT_MINUTE $NEXT_HOUR $NEXT_DAY $NEXT_MONTH *"
          echo "next_run_date=$NEXT_DATE UTC" >> "$GITHUB_OUTPUT"
          echo "next_cron=$NEW_CRON" >> "$GITHUB_OUTPUT"

          echo "::notice::⏰ 下次运行: $NEXT_DATE UTC"
          echo "::notice::📟 新 Cron: $NEW_CRON"

          git clone "https://x-access-token:${REPO_TOKEN}@github.com/akina005/action.git" workflow_repo
          WORKFLOW_FILE="workflow_repo/.github/workflows/Weirdhost_Renew.yml"
          LINE_NUM=$(grep -n "cron: '" "$WORKFLOW_FILE" | head -n1 | cut -d: -f1)

          if [ -z "$LINE_NUM" ]; then
            echo "::error::找不到 cron 行"
            exit 1
          fi

          sed -i "${LINE_NUM}c\    - cron: '$NEW_CRON'   # 自动更新下次运行时间" "$WORKFLOW_FILE"

          if git -C workflow_repo diff --quiet ".github/workflows/Weirdhost_Renew.yml"; then
            echo "::notice::没有变化需要提交"
            exit 0
          fi

          git -C workflow_repo config user.name "github-actions[bot]"
          git -C workflow_repo config user.email "github-actions[bot]@users.noreply.github.com"
          git -C workflow_repo add ".github/workflows/Weirdhost_Renew.yml"
          git -C workflow_repo commit -m "chore: update Weirdhost renew cron" -m "Next run: $NEXT_DATE UTC" -m "Cron: $NEW_CRON" -m "Due time: $DUE_DATETIME"
          git -C workflow_repo push
          echo "::notice::✅ Cron 更新成功"

      - name: 发送 Telegram 统一通知
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SCREENSHOT_PATH: ${{ steps.pick_screenshot.outputs.screenshot_path }}
          DUE_DATETIME: ${{ steps.extract_due.outputs.due_datetime }}
          NEXT_RUN_DATE: ${{ steps.update_cron.outputs.next_run_date }}
          NEXT_CRON: ${{ steps.update_cron.outputs.next_cron }}
        run: |
          python - <<'PYEOF'
          import json
          import os
          import re
          import urllib.request
          from datetime import datetime, timedelta
          from pathlib import Path

          token = os.environ.get("TG_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TG_CHAT_ID", "").strip()
          if not token or not chat_id:
              print("[INFO] 未配置 TG_BOT_TOKEN 或 TG_CHAT_ID，跳过统一通知")
              raise SystemExit(0)

          log_text = Path("renew.log").read_text(encoding="utf-8", errors="ignore") if Path("renew.log").exists() else ""
          due_text = os.environ.get("DUE_DATETIME", "").strip() or "未提取到"

          account_text = "Unknown"
          account_match = re.search(r"\[INFO\]\s*邮箱:\s*([^\s]+)", log_text)
          if account_match:
              account_text = account_match.group(1).strip()

          remaining_text = "未提取到"
          remaining_match = re.search(r"到期:\s*\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\s*\|\s*剩余:\s*([^\(\n]+)", log_text)
          if remaining_match:
              remaining_text = remaining_match.group(1).strip()

          server_status = "Unknown"
          if "[INFO] 登录成功" in log_text:
              server_status = "Running"

          next_run = os.environ.get("NEXT_RUN_DATE", "").strip() or "未更新"
          next_cron = os.environ.get("NEXT_CRON", "").strip()
          if next_run != "未更新":
              try:
                  utc_dt = datetime.strptime(next_run, "%Y-%m-%d %H:%M UTC")
                  beijing_dt = utc_dt + timedelta(hours=8)
                  next_run = beijing_dt.strftime("%Y-%m-%d %H:%M 北京时间")
              except ValueError:
                  pass

          result_text = "执行完成"
          failure_reason = ""
          if "续期按钮已禁用（可能在冷却期）" in log_text:
              result_text = "续期按钮已禁用（可能在冷却期）"
          elif "✅ 续期成功" in log_text or "续期成功!" in log_text:
              result_text = "续期成功！"
          else:
              error_patterns = [
                  r"\[ERROR\]\s*(.+)",
                  r"\[WARN\]\s*结果:\s*(.+)",
                  r"浏览器启动失败",
              ]
              for pattern in error_patterns:
                  match = re.search(pattern, log_text)
                  if match:
                      failure_reason = match.group(1).strip() if match.groups() else match.group(0).strip()
                      break
              result_text = failure_reason or "执行失败"

          message_lines = [
              "Weiedhost 续期通知",
              f"🎮 账号：{account_text}",
              f"⏳  剩余 {remaining_text}",
              f"📊 执行结果:  {result_text}",
              f"💻 服务器状态： {server_status}",
              f"🕐 下次运行时间: {next_run}",
          ]

          if result_text not in ["续期成功！", "续期按钮已禁用（可能在冷却期）"] and failure_reason:
              message_lines.append(f"❌ 失败原因: {failure_reason}")

          caption = "\n".join(message_lines)

          screenshot_path = os.environ.get("SCREENSHOT_PATH", "").strip()
          if screenshot_path and Path(screenshot_path).exists():
              boundary = "----OpenCodeTelegramBoundary"
              with open(screenshot_path, "rb") as img:
                  image_bytes = img.read()

              parts = []
              def add_field(name, value):
                  parts.append(f"--{boundary}\r\n".encode())
                  parts.append(f'Content-Disposition: form-data; name="{name}"\r\n\r\n'.encode())
                  parts.append(str(value).encode("utf-8"))
                  parts.append(b"\r\n")

              add_field("chat_id", chat_id)
              add_field("caption", caption)
              add_field("parse_mode", "HTML")
              parts.append(f"--{boundary}\r\n".encode())
              parts.append(f'Content-Disposition: form-data; name="photo"; filename="{Path(screenshot_path).name}"\r\n'.encode())
              parts.append(b"Content-Type: image/png\r\n\r\n")
              parts.append(image_bytes)
              parts.append(b"\r\n")
              parts.append(f"--{boundary}--\r\n".encode())
              body = b"".join(parts)

              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendPhoto",
                  data=body,
                  headers={"Content-Type": f"multipart/form-data; boundary={boundary}"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  print(resp.read().decode("utf-8", errors="ignore"))
          else:
              payload = json.dumps({
                  "chat_id": chat_id,
                  "text": caption,
                  "parse_mode": "HTML",
              }).encode("utf-8")
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  print(resp.read().decode("utf-8", errors="ignore"))
          PYEOF

      - name: 清理旧的工作流运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
