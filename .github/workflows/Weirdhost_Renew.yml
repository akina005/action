# .github/workflows/Weirdhost_renew.yml
name: Weirdhost 多账号自动续期 (增强版)

on:
  schedule:
    # 每天北京时间 12:20
    - cron: '20 4 * * *'
  workflow_dispatch:

jobs:
  add_time:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      # 1. 采用代码 B 的拉取方式：从私有仓库获取脚本
      - name: 拉取私有仓库脚本
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .  # 拉取到当前工作目录

      - name: 设置 Python 环境
        uses: actions/setup-python@v5 # 推荐使用 v5，支持更好的缓存
        with:
          python-version: "3.11"
          cache: 'pip' # 自动缓存依赖，提升运行速度

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-nanum fonts-noto-cjk

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase aiohttp pynacl
          # 预安装浏览器驱动，确保环境稳定性
          seleniumbase install chromedriver

      - name: 运行续期脚本
        env:
          # 账号与 Cookie 信息
          ACCOUNTS: ${{ secrets.WEIRDHOST_ACCOUNTS }}
          WEIRDHOST_COOKIE_1: ${{ secrets.WEIRDHOST_COOKIE_1 }}
          WEIRDHOST_COOKIE_2: ${{ secrets.WEIRDHOST_COOKIE_2 }}
          WEIRDHOST_COOKIE_3: ${{ secrets.WEIRDHOST_COOKIE_3 }}
          WEIRDHOST_COOKIE_4: ${{ secrets.WEIRDHOST_COOKIE_4 }}
          WEIRDHOST_COOKIE_5: ${{ secrets.WEIRDHOST_COOKIE_5 }}
          
          # 通知与 API 信息
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          
          # 逻辑阈值（代码 B 新增逻辑）
          RENEW_THRESHOLD_DAYS: "2"  # 到期前 2 天才执行续期动作
          NOTIFY_THRESHOLD_DAYS: "4" # 剩余天数 <= 4 天才发送 TG 通知
        run: |
          # 注意：这里路径使用了代码 B 的 scripts/Weirdhost/ 路径，请确保私库目录一致
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          python scripts/Weirdhost/Weirdhost_renew.py

      - name: 清理旧的工作流运行记录
        if: always() # 确保即使脚本运行失败，也会清理历史记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
