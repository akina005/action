name: X10hosting Login

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 5'  # 每周五晚上8点

jobs:
  login:
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
       
      - name: Install
        timeout-minutes: 10
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          set -euo pipefail
          sudo -E apt-get update -qq
          sudo -E apt-get install -y -qq -o Dpkg::Use-Pty=0 \
            xvfb ffmpeg mesa-utils libgl1-mesa-glx libgl1-mesa-dri
          pip install --quiet playwright requests SpeechRecognition pydub
          python -m playwright install --with-deps chromium

      - name: 启用 WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 配置 DNS 并验证 WARP
        timeout-minutes: 5
        run: |
          set -euo pipefail
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sleep 3

          for i in {1..30}; do
            status=$(curl -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace | grep -oP 'warp=\K\w+' || echo unknown)
            [[ "$status" =~ ^(on|plus)$ ]] && echo "WARP 已连接" && break
            echo "WARP 连接中... ($i/30)"
            sleep 2
          done
           
      - name: Run
        timeout-minutes: 30
        env:
          PYTHONUNBUFFERED: "1"
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          X10hosting: ${{ secrets.X10hosting }}
          X10_MAX_LOGIN_ATTEMPTS: "3"
          X10_MAX_CAPTCHA: "8"
          X10_MAX_RUN_SECONDS: "1800"
          X10_TG_PROGRESS: "1"
          DISPLAY: :99
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
        run: |
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac -noreset +extension GLX +render" \
            python -u scripts/X10hosting/login_script.py

      - name: Job Summary
        if: always()
        timeout-minutes: 1
        run: |
          {
            echo "## X10hosting Job"
            echo ""
            echo "- Job finished at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Run step timeout: 30 minutes"
            echo "- Artifact upload: disabled"
          } >> "$GITHUB_STEP_SUMMARY"
