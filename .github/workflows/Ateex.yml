name: Ateex Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '33 0 * * *' # 北京时间每天早上 08:33 运行

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup environment
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          sudo -E apt-get update -qq
          sudo -E apt-get install -y -qq -o Dpkg::Use-Pty=0 xvfb p7zip-full ffmpeg 2>&1 | tail -5
          pip install --quiet playwright requests
          python -m playwright install --with-deps chromium
          mkdir -p extensions/turnstile-bypasser/unpacked
          curl -fsSL "https://github.com/oyz6/action/releases/download/Verification/turnstile.crx" -o extensions/turnstile-bypasser/turnstile.crx
          7z x -y extensions/turnstile-bypasser/turnstile.crx -oextensions/turnstile-bypasser/unpacked > /dev/null

      - name: Enable WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: Check WARP IP
        run: |
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep warp || true
          curl -s https://api.ipify.org && echo
          curl -s https://ipinfo.io

      - name: Fetch private Ateex script
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          curl -sL \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            -o main.py \
            "https://api.github.com/repos/akina005/scripts/contents/scripts/Ateex/main.py?ref=main"

      - name: Run full flow
        env:
          Ateex_ACCOUNTS: ${{ secrets.Ateex_ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python main.py

      - name: Cleanup old runs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_NAME: Ateex Auto Renew
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          repo = os.environ["REPO"]
          workflow_name = os.environ["WORKFLOW_NAME"]

          result = subprocess.run(
              ["gh", "api", f"repos/{repo}/actions/runs", "--paginate"],
              capture_output=True,
              text=True,
              check=True,
          )
          runs = json.loads(result.stdout).get("workflow_runs", [])
          target_runs = [run for run in runs if run.get("name") == workflow_name]
          target_runs.sort(key=lambda run: run.get("created_at", ""), reverse=True)

          for run in target_runs[5:]:
              run_id = str(run["id"])
              print(f"Deleting old run: {run_id}")
              subprocess.run(
                  ["gh", "api", "-X", "DELETE", f"repos/{repo}/actions/runs/{run_id}"],
                  check=True,
              )
          PY
