name: Rustix 自动登录脚本

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定邮箱账号（留空运行全部，多个用逗号分隔）'
        required: false
        default: ''
  # schedule:
  #   - cron: '0 2 * * *' # 如果需要定时运行，可以取消注释并修改时间 (UTC)

jobs:
  rustix_task:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts # 👈 已更新为你的仓库
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装精简依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install -q seleniumbase pyvirtualdisplay requests PyNaCl

      - name: 配置固定 IP 代理 (Hysteria2)
        env:
          HY2_URL: ${{ secrets.HY2_URL }}
        run: |
          if [ -z "$HY2_URL" ]; then
            echo "[INFO] 未配置 HY2_URL，跳过代理。"
            exit 0
          fi
          wget -q https://github.com/oyz6/action/releases/download/proxy/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria
          URL="${HY2_URL#hysteria2://}"
          PASSWORD="${URL%%@*}"
          SERVER="${URL#*@}"; SERVER="${SERVER%%\?*}"
          SNI=$(echo "$URL" | grep -oP 'sni=\K[^&]+' || echo "${SERVER%%:*}")
          cat > hy2.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: true
          http:
            listen: 127.0.0.1:7890
          EOF
          ./hysteria client -c hy2.yaml > /dev/null 2>&1 &
          sleep 3
          if curl -s --proxy http://127.0.0.1:7890 https://api.ipify.org >/dev/null; then
            echo "PROXY_SERVER=http://127.0.0.1:7890" >> $GITHUB_ENV
            echo "[INFO] 代理已连通，启用浏览器代理。"
          else
            echo "[WARN] 代理未连通，本次任务改为直连。"
          fi

      - name: 执行 Rustix 任务
        env:
          RUSTIX_ACCOUNTS: ${{ github.event.inputs.accounts }}
          RUSTIX_1: ${{ secrets.RUSTIX_1 }}
          RUSTIX_2: ${{ secrets.RUSTIX_2 }}
          RUSTIX_3: ${{ secrets.RUSTIX_3 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HEADLESS: "false"
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python scripts/Rustix.py
          echo "完成"

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
